function findFoodIndex(text){
  let t=text.toLowerCase();
  const aliases=[
    ['clara','Claras de huevo'],['huevo','Huevo'],['tortilla','Tortilla maíz'],['arroz integral','Arroz integral'],
    ['arroz','Arroz cocido'],['frijol','Frijol'],['lenteja','Lentejas'],['garbanzo','Garbanzos'],
    ['pechuga','Pollo 100g'],['muslo','Muslo de pollo'],['pollo rostizado','Pollo rostizado'],['pollo','Pollo 100g'],
    ['carne molida','Carne molida'],['bistec','Bistec'],['res','Bistec'],['cerdo','Carne de cerdo'],
    ['jamón','Jamón'],['jamon','Jamón'],['pavo','Pavo cocido'],['atún','Atún'],['atun','Atún'],
    ['sardina','Sardinas'],['salmón','Salmón'],['salmon','Salmón'],['tilapia','Tilapia'],['camarón','Camarón'],
    ['avena','Avena'],['leche 2','Leche 2%'],['leche','Leche entera'],['yogurt','Yogurt griego'],
    ['cottage','Queso cottage'],['queso fresco','Queso fresco'],['cheddar','Queso cheddar'],['queso','Queso 28g'],
    ['crema cacahuate','Crema cacahuate'],['cacahuate','Crema cacahuate'],['crema','Crema 1 cucharada'],
    ['mantequilla','Mantequilla'],['aceite','Aceite oliva'],['mayonesa','Mayonesa'],['aguacate','Aguacate'],
    ['papa','Papa mediana'],['camote','Camote'],['pasta','Pasta cocida'],['bolillo','Bolillo'],
    ['pan','Pan integral'],['tostada','Tostada'],['granola','Granola'],['cereal','Cereal'],
    ['plátano','Plátano'],['platano','Plátano'],['mango','Mango'],['piña','Piña'],['fresa','Fresas'],
    ['manzana','Manzana'],['naranja','Naranja'],['espinaca','Espinaca'],['brócoli','Brócoli'],
    ['brocoli','Brócoli'],['tomate','Tomate'],['jitomate','Tomate'],['cebolla','Cebolla'],
    ['zanahoria','Zanahoria'],['calabacita','Calabacita'],['pepino','Pepino'],['salsa','Salsa 1/2 taza'],
    ['miel','Miel'],['nutella','Nutella'],['whey','Proteína whey'],['proteína','Proteína whey']
  ];
  let found=aliases.find(([alias])=>t.includes(alias));
  if(!found)return-1;
  return foods.findIndex(f=>f[0].toLowerCase().includes(found[1].toLowerCase()));
}
function parseIngredientAmount(text,foodIndex){
  let t=text.toLowerCase().replace('½','.5').replace('¼','.25').replace('¾','.75').replace('⅓','.333').replace('⅔','.667');
  let m=getFoodMeasure(foodIndex),number=(t.match(/(?:^|\s)(\d+(?:\.\d+)?)/)||[])[1];
  let amount=number?+number:m.base;
  if(/media taza|\.5 taza/.test(t))amount=.5;
  if(/cuarto de taza|\.25 taza/.test(t))amount=.25;
  if(m.unit==='g'){
    let grams=t.match(/(\d+(?:\.\d+)?)\s*g/);
    if(grams)amount=+grams[1];
    else if(/¼ cebolla/.test(text))amount=25;
    else if(/½ cebolla/.test(text))amount=50;
    else if(!number)amount=m.base;
  }
  if(m.unit==='cda'&&/taza/.test(t))amount=amount*16;
  return Math.max(.1,amount);
}
function buildRecipeIngredients(recipe){
  if(!recipe)return[];
  let source=(recipe.ingredients||'').split(',').map(x=>x.trim()).filter(Boolean);
  let rows=source.map(text=>{
    let foodIndex=findFoodIndex(text);if(foodIndex<0)return null;
    let measure=getFoodMeasure(foodIndex);
    return{foodIndex,amount:parseIngredientAmount(text,foodIndex)*_servings,unit:measure.unit,source:text};
  }).filter(Boolean);
  if(!rows.length){
    let defaults=recipe.type==='licuado'?['leche','plátano','avena','crema cacahuate']:
      recipe.type==='desayuno'?['huevo','tortilla','frijol']:
      ['pollo','arroz','frijol','aceite'];
    rows=defaults.map(text=>{let foodIndex=findFoodIndex(text),m=getFoodMeasure(foodIndex);return{foodIndex,amount:m.base*_servings,unit:m.unit,source:text}});
  }
  return rows;
}

}

function makeFridgeRecipe(mode='normal'){

  let base=mode==='sinCocinar'?(carb[0]||picked.find(x=>['plátano','banana'].includes(x))||'tortillas'):carbPool[Math.floor(cIdx/protPool.length)%carbPool.length];

  let safety=mode==='trabajo'?'<div class="warn" style="margin-top:10px"><b>Seguridad para trabajo:</b> si lleva pollo, leche, queso o yogurt, llévalo frío con hielo o en termo. No lo dejes al sol del carro.</div>':'';

  ${foodPlateVisual(name,protein,base,[...extra,...veg,...dairy],mode)}

    <div class="mini"><b>${kcal}</b><br>kcal aprox.</div>
    <div class="mini"><b>${proteinG}g</b><br>proteína</div>
    <div class="mini"><b>10-18 min</b><br>tiempo</div>
    <div class="mini"><b>${mode==='trabajo'?'Sí':'Opcional'}</b><br>sirve para trabajo</div>
  </div>
  <div class="grid" style="margin-top:10px;align-items:start">
    <div class="mini"><b>Ingredientes</b><ul>${ingredients.map(x=>`<li>${safeText(x)}</li>`).join('')}</ul></div>
    <div class="mini"><b>Qué falta comprar</b><ul>${shop.map(x=>`<li>${safeText(x)}</li>`).join('')}</ul></div>

function fitnessFlexibleConfig(mode){

  if(mode==='dolor')Object.assign(cfg,{minutes:15,intensity:'movilidad',reason:reason||'dolor o molestia'});

function buildFitnessFlexiblePlan(mode,basePlan,cfg){
  let b=fitnessExerciseBank();
  let copy=(x)=>({...x,alts:[...(x.alts||[])]});
  let plan=(basePlan&&basePlan.length?basePlan.map(copy):buildFitnessTodayPlan(readFitnessContext()).map(copy));
  if(mode==='dolor')plan=[copy(b.mobility),copy(b.core)];
  else if(mode==='habito')plan=[copy(b.mobility),copy(b.core),copy(b.row)];
  else if(mode==='poco_tiempo')plan=plan.slice(0,3);
  else if(mode==='cansado')plan=plan.slice(0,4);
  else if(cfg.minutes<=10)plan=plan.slice(0,2);
  else if(cfg.minutes<=15)plan=plan.slice(0,3);
  else if(cfg.minutes<=20)plan=plan.slice(0,4);
  plan=plan.map((x,i)=>{
    if(cfg.intensity==='movilidad'||mode==='dolor'){
      x.sets=Math.min(2,+x.sets||2);x.reps=x.muscle==='Recuperación'?'45-60s':'8-10 suave';x.rest=Math.min(45,+x.rest||45);x.note='Adaptado solo hoy: movilidad/técnica, sin dolor y sin llegar al fallo.';
    }else if(cfg.intensity==='suave'||mode==='cansado'||mode==='habito'){
      x.sets=Math.min(2,+x.sets||2);x.rest=Math.min(60,+x.rest||60);x.note='Adaptado solo hoy: baja intensidad, deja 2-3 repeticiones en reserva.';
    }else{
      x.sets=Math.min(3,+x.sets||3);x.note='Adaptado solo hoy por tiempo: series efectivas, técnica limpia.';
    }
    return x;
  });
  return plan;
}

// Divisiones por días y objetivo
function routineSplit(days){
  if(days<=3)return [['Cuerpo completo A',['pecho','espalda','pierna','hombro','core']],['Cuerpo completo B',['espalda','pierna','pecho','biceps','triceps']],['Cuerpo completo C',['pierna','hombro','espalda','core','biceps']]];
  if(days===4)return [['Tren superior A',['pecho','espalda','hombro','biceps','triceps']],['Tren inferior A',['pierna','pierna','core']],['Tren superior B',['espalda','pecho','hombro','triceps','biceps']],['Tren inferior B',['pierna','pierna','core']]];
  if(days===5)return [['Empuje (pecho/hombro/tríceps)',['pecho','hombro','triceps','core']],['Jalón (espalda/bíceps)',['espalda','espalda','biceps']],['Pierna',['pierna','pierna','core']],['Tren superior',['pecho','espalda','hombro','biceps','triceps']],['Tren inferior + core',['pierna','pierna','core','core']]];
  return [['Empuje A',['pecho','hombro','triceps']],['Jalón A',['espalda','biceps','core']],['Pierna A',['pierna','pierna','core']],['Empuje B',['pecho','hombro','triceps']],['Jalón B',['espalda','biceps','core']],['Pierna B',['pierna','pierna','core']]];
}
function goalScheme(goal,exp){
  let s;
  if(goal==='fuerza')s={sets:exp==='principiante'?3:exp==='avanzado'?5:4,reps:'4-6',rest:'2-3 min'};
  else if(goal==='resistencia')s={sets:exp==='principiante'?2:3,reps:'15-20',rest:'30-45 seg'};
  else if(goal==='bajar grasa')s={sets:3,reps:'10-15',rest:'45-60 seg'};
  else s={sets:exp==='principiante'?3:exp==='avanzado'?4:4,reps:'8-12',rest:'60-90 seg'}; // hipertrofia
  return s;
}
function exercisesPerSession(minutes){return minutes<=30?4:minutes<=45?5:minutes<=60?6:7;}
function buildCustomRoutine(cfg){
  let split=routineSplit(cfg.days),scheme=goalScheme(cfg.goal,cfg.exp),perDay=exercisesPerSession(cfg.minutes);
  let equipKey=cfg.equip==='casa'?'casa':cfg.equip==='mancuernas'?'mancuernas':'gym';
  let days=split.map(([dayName,muscles])=>{
    let picks=[],usedByMuscle={};
    // fill up to perDay, cycling through the day's muscle list, preferring compounds first
    let mi=0,guard=0;
    while(picks.length<perDay&&guard<60){
      let m=muscles[mi%muscles.length];mi++;guard++;
      let pool=routineDB[m]||[];if(!pool.length)continue;
      let idx=usedByMuscle[m]||0;
      // beginners prefer compounds/machines: sort compounds first for first pass
      let ordered=cfg.exp==='principiante'?pool.slice().sort((a,b)=>(b.compound?1:0)-(a.compound?1:0)):pool;
      if(idx>=ordered.length)continue;
      let ex=ordered[idx];usedByMuscle[m]=idx+1;
      picks.push({name:ex[equipKey],muscle:m,sets:scheme.sets,reps:scheme.reps,rest:scheme.rest});
    }
    return {day:dayName,exercises:picks};
  });
  return {createdAt:new Date().toISOString(),cfg,scheme,days,currentDay:0,history:[],weekSchedule:defaultWeekSchedule(days.length),selectedWeekday:null};
}

function copyPlainText(txt,statusId){

function restSeconds(str){let m=String(str).match(/\d+/g);if(!m)return 75;if(m.length>=2)return Math.round((+m[0]+ +m[1])/2);return +m[0];}
function parseRepRange(reps){let m=String(reps).match(/\d+/g)||[];return {min:+m[0]||8,max:+m[1]|| +m[0]||12};}
function suggestTargetWeight(name,muscle,reps){
  let hist=workoutHistoryForExercise(name).filter(x=>+x.weight>0);
  if(!hist.length)return {target:null,text:'Primera vez: usa un peso que puedas hacer todas las reps dejando 1-2 en reserva.',last:null};
  let last=hist[0],W=+last.weight||0,feel=String(last.note||last.feel||'').toLowerCase();
  let repsAchieved=Math.max(...(String(last.reps).match(/\d+/g)||['0']).map(Number));
  let range=parseRepRange(reps);
  let inc=(muscle==='pierna'||muscle==='espalda')?10:5;
  let target,text;
  if(feel.includes('dolor')){target=Math.max(0,W-inc);text='La última vez hubo molestia → baja a '+target+' lb y cuida la técnica.';}
  else if(feel.includes('fácil')||feel.includes('facil')||repsAchieved>=range.max){target=W+inc;text='La última vez '+((feel.includes('fácil')||feel.includes('facil'))?'se sintió fácil':'llegaste al tope de reps')+' → sube a '+target+' lb.';}
  else if(feel.includes('pesado')){target=W;text='La última vez pesó → repite '+W+' lb hasta que salga limpio.';}
  else {target=W;text='Repite '+W+' lb y busca 1 repetición más que la última vez.';}
  return {target,text,last:{weight:W,reps:last.reps}};
}
function routineDayPlan(di){
  let r=state.customRoutine;if(!r||!r.days[di])return [];
  let equipKey=r.cfg.equip==='casa'?'casa':r.cfg.equip==='mancuernas'?'mancuernas':'gym';
  return r.days[di].exercises.map(x=>{
    let sug=suggestTargetWeight(x.name,x.muscle,x.reps);
    let alts=(routineDB[x.muscle]||[]).map(e=>e[equipKey]).filter(n=>n&&n!==x.name);
    return {name:x.name,muscle:x.muscle,sets:+String(x.sets).match(/\d+/)?.[0]||3,reps:x.reps,rest:restSeconds(x.rest),alts:alts,target:sug.target,progressText:sug.text,lastWeight:sug.last?sug.last.weight:null,note:'De tu rutina · Día '+(di+1)};
  });
}

function todayWeekdayIndex(){return (new Date().getDay()+6)%7;} // Lunes=0 … Domingo=6
function defaultWeekSchedule(nDays){
  let map={3:[0,'rest',1,'rest',2,'rest','rest'],4:[0,1,'rest',2,3,'rest','rest'],5:[0,1,2,3,4,'rest','rest'],6:[0,1,2,3,4,5,'rest']};
  if(map[nDays])return map[nDays].slice();
  let arr=[];for(let i=0;i<7;i++)arr.push(i<nDays?i:'rest');return arr;
}
function ensureWeekSchedule(){let r=state.customRoutine;if(!r)return;if(!Array.isArray(r.weekSchedule)||r.weekSchedule.length!==7)r.weekSchedule=defaultWeekSchedule(r.days.length);}
function selectWeekday(i){if(!state.customRoutine)return;state.customRoutine.selectedWeekday=i;save();renderRoutineToday();}
function setWeekdayAssignment(i,val){if(!state.customRoutine)return;state.customRoutine.weekSchedule[i]=(val==='rest'?'rest':+val);save();renderRoutineToday();}
function toggleEditWeek(){if(!state.customRoutine)return;state.customRoutine._editWeek=!state.customRoutine._editWeek;save();renderRoutineToday();}
function renderRoutineToday(){
  let out=document.getElementById('routineTodayOut');if(!out)return;
  let r=state.customRoutine;
  if(!r){out.innerHTML='<div class="muted" style="margin-bottom:12px">Crea tu rutina abajo en “Constructor de rutina” y aquí verás tu semana con un botón para cada día.</div>';return}
  ensureWeekSchedule();
  let today=todayWeekdayIndex();
  let sel=(r.selectedWeekday==null?today:r.selectedWeekday);if(sel<0||sel>6)sel=today;
  let assign=r.weekSchedule[sel];
  let editing=!!r._editWeek;
  let bar=weekdayShort.map((wd,i)=>{
    let a=r.weekSchedule[i],isRest=(a==='rest'),isSel=i===sel,isToday=i===today;
    return `<button onclick="selectWeekday(${i})" style="flex:1;min-width:0;padding:7px 2px;border-radius:11px;border:1.5px solid ${isSel?'#15704f':'#dfe7e2'};background:${isSel?'#15704f':'#fff'};color:${isSel?'#fff':'#2b3a33'};font-size:11px;font-weight:800;line-height:1.15;cursor:pointer">${wd}<div style="font-size:8px;font-weight:600;opacity:${isSel?'.9':'.6'}">${isToday?'hoy':(isRest?'descanso':'entreno')}</div><div style="width:6px;height:6px;border-radius:99px;margin:4px auto 0;background:${isRest?(isSel?'#cfe6d8':'#cbd5cf'):(isSel?'#bff0d2':'#15704f')}"></div></button>`;
  }).join('');
  let detail;
  if(assign==='rest'){
    detail=`<div style="border:1px solid #e6ede9;background:#f8fbf9;border-radius:14px;padding:16px;margin-top:12px;text-align:center"><div style="font-size:30px">😴</div><b>Día de descanso</b><p class="muted" style="margin:6px 0 0;font-size:13px">Recupérate: duerme bien, come suficiente proteína y camina suave. El músculo crece descansando.</p></div>`;
  }else{
    let plan=routineDayPlan(assign),day=r.days[assign];
    detail=`<div style="border:2px solid #15704f;background:#f7fff9;border-radius:14px;padding:12px;margin-top:10px">
      <div class="row" style="justify-content:space-between;align-items:baseline"><b style="font-size:15px">${safeText(day.day)}</b><span class="muted" style="font-size:11px">${weekdayNames[sel]}${sel===today?' · hoy':''}</span></div>
      <div style="margin-top:8px">${plan.map(x=>`<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #eef3f0"><div style="min-width:0;font-size:13px;line-height:1.35"><b>${safeText(x.name)}</b> <span class="muted">${x.sets}×${safeText(x.reps)}</span>${x.target!=null?' · <span style="color:#15704f">🎯'+x.target+' lb</span>':''}</div><button class="btn" style="padding:4px 9px;font-size:13px;flex-shrink:0" onclick="exerciseHelp('${String(x.name).replace(/'/g,"\\'")}')">🖼️</button></div>`).join('')}</div>
      <button class="btn primary" style="width:100%;margin-top:10px;padding:13px;font-size:16px" onclick="startRoutineDay(${assign})">▶️ Empezar (guiado)</button>
    </div>`;
  }
  let edit=editing?`<div style="border:1px solid #e6ede9;border-radius:12px;padding:12px;margin-top:14px;background:#fbfcfb"><b style="font-size:14px">✏️ Cambiar qué rutina va cada día</b><p class="muted" style="font-size:12px;margin:4px 0 8px">Elige qué día de tu rutina entrenas cada día de la semana, o ponlo en descanso.</p>${weekdayNames.map((wd,i)=>`<div class="row" style="justify-content:space-between;align-items:center;margin-top:8px"><span style="font-size:13px">${wd}</span><select onchange="setWeekdayAssignment(${i},this.value)" style="width:62%"><option value="rest" ${r.weekSchedule[i]==='rest'?'selected':''}>😴 Descanso</option>${r.days.map((d,di)=>`<option value="${di}" ${r.weekSchedule[i]===di?'selected':''}>Día ${di+1}: ${safeText(d.day)}</option>`).join('')}</select></div>`).join('')}<button class="btn primary" style="width:100%;margin-top:12px" onclick="toggleEditWeek()">✓ Listo, volver a mi entrenamiento</button></div>`:'';
  out.innerHTML=`<div class="card" style="margin-bottom:12px">
    <div class="row" style="justify-content:space-between;align-items:center"><h3 style="margin:0">🗓️ Mi semana</h3><button class="btn" style="padding:6px 12px;font-size:12px" onclick="toggleEditWeek()">${editing?'✓ Listo':'✏️ Cambiar días'}</button></div>
    <div class="muted" style="font-size:12px;margin-top:2px">Toca un día para ver tu entrenamiento.</div>
    <div style="display:flex;gap:4px;margin-top:10px">${bar}</div>
    ${detail}${edit}
  </div>`;
}

// ---- GRASA CORPORAL % ----
function calcNavyBodyFat(){
  let out=document.getElementById('bodyFatOut');if(!out)return;
  let heightCm=+state.profile.altura||170, heightIn=heightCm/2.54;
  let waist=+(document.getElementById('bfWaist')||{}).value||0;
  let neck=+(document.getElementById('bfNeck')||{}).value||0;
  let hip=+(document.getElementById('bfHip')||{}).value||0;
  let sex=(state.profile.sexo||'hombre').toLowerCase().startsWith('m')?'mujer':'hombre';
  if(!waist||!neck||(sex==='mujer'&&!hip)){out.innerHTML='<div class="warn">Escribe al menos cintura y cuello (mujeres también cadera), en pulgadas.</div>';return}
  let bf;
  if(sex==='mujer')bf=163.205*Math.log10(waist+hip-neck)-97.684*Math.log10(heightIn)-78.387;
  else bf=86.010*Math.log10(waist-neck)-70.041*Math.log10(heightIn)+36.76;
  if(!isFinite(bf)||bf<=0){out.innerHTML='<div class="warn">Revisa las medidas: la cintura debe ser mayor que el cuello.</div>';return}
  bf=Math.max(3,Math.min(60,bf));
  let cat=bfCategory(bf,sex);
  state.bodyFat.unshift({date:todayISO(),method:'Navy',pct:+bf.toFixed(1),waist,neck,hip:hip||null});state.bodyFat=state.bodyFat.slice(0,60);save();
  out.innerHTML=`<div class="ok"><b>Grasa corporal estimada: ${bf.toFixed(1)}%</b> <span class="muted">(método de cinta Navy)</span><br>Categoría: <b>${cat}</b><br><span class="muted">Es una estimación (±3-4%). Lo importante es la tendencia: mide en el mismo momento (mañana, en ayunas) cada 2-4 semanas.</span></div>`;
  renderBodyFatHistory();
}
function bfCategory(bf,sex){
  if(sex==='mujer'){if(bf<14)return 'Esencial/atleta';if(bf<21)return 'Fitness';if(bf<25)return 'Promedio';if(bf<32)return 'Aceptable';return 'Alto';}
  if(bf<6)return 'Esencial';if(bf<14)return 'Atleta';if(bf<18)return 'Fitness';if(bf<25)return 'Promedio';return 'Alto';
}
function renderBodyFatHistory(){
  let out=document.getElementById('bodyFatHistory');if(!out)return;
  let h=state.bodyFat||[];
  if(!h.length){out.innerHTML='';return}
  let spark=miniSparkline(h.slice(0,12).map(x=>x.pct).reverse(),'#15704f');
  out.innerHTML=`<div style="margin-top:10px"><b>Historial de grasa %</b> ${spark}<div class="list" style="margin-top:6px">${h.slice(0,6).map(x=>`<div class="item">${x.date}: <b>${x.pct}%</b> <span class="muted">· ${safeText(x.method)}${x.waist?' · cintura '+x.waist+'"':''}</span></div>`).join('')}</div></div>`;
}
async function estimateBodyFatWithAI(){
  let out=document.getElementById('bodyFatAiOut');if(!out)return;
  let key=(state.fitSettings.aiKey||'').trim();
  let file=(document.getElementById('bfPhoto')||{}).files?.[0];
  if(!key){out.innerHTML='<div class="warn">Primero pega tu API key de Anthropic abajo y guárdala.</div>';return}
  if(!file){out.innerHTML='<div class="warn">Elige o toma una foto primero (de frente, buena luz, torso visible).</div>';return}
  out.innerHTML='<div class="muted">Analizando la foto con IA… puede tardar unos segundos.</div>';
  try{
    let b64=await fileToBase64(file);
    let mediaType=file.type||'image/jpeg';
    let res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mediaType,data:b64}},{type:'text',text:'Eres un entrenador. Da SOLO una estimación aproximada del porcentaje de grasa corporal de la persona en la foto, como un rango (ej. "15-18%"), y una frase corta de qué observas (definición muscular, abdomen). Aclara en una línea que es una estimación visual imprecisa y que el método de cinta o una báscula de bioimpedancia son más confiables. Responde en español, breve, sin markdown.'}]}]})});
    if(!res.ok){let t=await res.text();throw new Error('HTTP '+res.status+' '+t.slice(0,120));}
    let data=await res.json();
    let txt=(data.content||[]).filter(x=>x.type==='text').map(x=>x.text).join('\n')||'Sin respuesta.';
    out.innerHTML=`<div class="ok"><b>Estimación con IA:</b><br>${safeText(txt)}</div><p class="muted" style="font-size:12px;margin-top:6px">Recuerda: la foto da un número aproximado. El método de cinta de arriba es más confiable y no cuesta nada.</p>`;
  }catch(e){
    out.innerHTML=`<div class="warn"><b>No se pudo estimar con IA.</b> ${safeText(e.message)}<br><span class="muted">Puede ser la API key, saldo de tu cuenta, o conexión. El método de cinta de arriba funciona sin internet.</span></div>`;
  }
}
function fileToBase64(file){return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
function saveAiKey(){
  let k=(document.getElementById('bfAiKey')||{}).value||'';
  state.fitSettings.aiKey=k.trim();save();
  let out=document.getElementById('bodyFatAiOut');if(out)out.innerHTML='<div class="ok">✅ API key guardada en este teléfono.</div>';
}

// ---- GRÁFICAS DE PROGRESO POR EJERCICIO ----
function miniSparkline(vals,color){
  if(!vals||vals.length<2)return '';
  let w=120,h=28,min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  let pts=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${(h-((v-min)/rng)*h).toFixed(1)}`).join(' ');
  return `<svg width="${w}" height="${h}" style="vertical-align:middle;margin-left:6px"><polyline points="${pts}" fill="none" stroke="${color||'#15704f'}" stroke-width="2"/></svg>`;
}
function svgLineChart(series,opts){
  opts=opts||{};let w=opts.w||300,h=opts.h||140,pad=26;
  let vals=series.map(s=>s.y),labels=series.map(s=>s.x);
  if(!vals.length)return '<p class="muted">Sin datos.</p>';
  let min=Math.min(...vals),max=Math.max(...vals);if(min===max){min=min-1;max=max+1;}
  let rng=max-min;
  let px=i=>pad+(series.length<=1?0:i/(series.length-1)*(w-pad*2));
  let py=v=>h-pad-((v-min)/rng)*(h-pad*2);
  let line=series.map((s,i)=>`${px(i).toFixed(1)},${py(s.y).toFixed(1)}`).join(' ');
  let dots=series.map((s,i)=>`<circle cx="${px(i).toFixed(1)}" cy="${py(s.y).toFixed(1)}" r="3" fill="#15704f"/>`).join('');
  let yTop=max.toFixed(max%1?1:0),yBot=min.toFixed(min%1?1:0);
  let xFirst=labels[0],xLast=labels[labels.length-1];
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" style="background:#f8fff9;border-radius:12px;border:1px solid #e0efe6">
    <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="#cfe6d8"/>
    <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#cfe6d8"/>
    <text x="2" y="${pad+4}" font-size="9" fill="#6a7d72">${yTop}</text>
    <text x="2" y="${h-pad+3}" font-size="9" fill="#6a7d72">${yBot}</text>
    <text x="${pad}" y="${h-6}" font-size="9" fill="#6a7d72">${safeText(String(xFirst))}</text>
    <text x="${w-pad}" y="${h-6}" font-size="9" fill="#6a7d72" text-anchor="end">${safeText(String(xLast))}</text>
    <polyline points="${line}" fill="none" stroke="#15704f" stroke-width="2.5"/>${dots}
  </svg>`;
}
function loggedExerciseNames(){
  let names=[...new Set((state.workoutLog||[]).map(x=>String(x.exercise||'').trim()).filter(Boolean))];
  return names.sort();
}
function renderExerciseProgress(){
  let sel=document.getElementById('progExercise'),out=document.getElementById('exerciseProgressOut');if(!out)return;
  let name=sel?sel.value:'';
  if(!name){out.innerHTML='<div class="muted">Elige un ejercicio para ver su progreso.</div>';return}
  let hist=workoutHistoryForExercise(name).slice().reverse().filter(x=>+x.weight>0);
  if(hist.length<1){out.innerHTML='<div class="warn">Aún no hay pesos registrados para '+safeText(name)+'. Registra algunos entrenamientos con peso para ver la gráfica.</div>';return}
  let weightSeries=hist.map(x=>({x:(x.date||'').slice(5),y:+x.weight}));
  let volSeries=hist.map(x=>{let reps=parseInt(String(x.reps).match(/\d+/)?.[0]||0)||0;let sets=+x.sets||1;return {x:(x.date||'').slice(5),y:Math.round(sets*reps*(+x.weight||0))};});
  let pr=Math.max(...hist.map(x=>+x.weight||0));
  let first=hist[0].weight,last=hist[hist.length-1].weight,diff=(+last-+first);
  out.innerHTML=`<div class="grid" style="margin-bottom:8px">
    <div class="mini"><b>${pr} lb</b><br>récord (PR)</div>
    <div class="mini"><b>${diff>=0?'+':''}${diff} lb</b><br>desde el inicio</div>
    <div class="mini"><b>${hist.length}</b><br>sesiones</div>
  </div>
  <b style="font-size:13px">Peso (lb) por sesión</b>${svgLineChart(weightSeries)}
  <b style="font-size:13px">Volumen (series×reps×peso)</b>${svgLineChart(volSeries)}`;
}

function readFitnessContext(){
  let lastWalk=(state.walks||[]).slice(-1)[0]||{};
  let steps=+(document.getElementById('fitSteps')?.value||lastWalk.steps||22000);
  let energy=+(document.getElementById('fitEnergy')?.value||3),pain=+(document.getElementById('fitPain')?.value||0),sleep=+(document.getElementById('fitSleep')?.value||7);
  let focus=document.getElementById('fitFocus')?.value||'Ganar músculo sin quedar molido',equip=document.getElementById('fitEquip')?.value||'Gimnasio';
  let hard=steps>=22000||energy<=2||pain>=2||sleep<6;
  let recovery=pain>=3||energy<=1;
  return {date:todayISO(),steps,energy,pain,sleep,focus,equip,hard,recovery};
}
function buildFitnessTodayPlan(ctx){
  let b=fitnessExerciseBank(),keys=ctx.hard?['press','row','lat','core']:['press','row','pull','lat','curl'];
  if(ctx.focus.includes('Espalda'))keys=ctx.hard?['row','pull','face','curl']:['row','pull','face','press','curl'];
  if(ctx.focus.includes('Brazos'))keys=ctx.hard?['curl','tri','lat','core']:['press','row','curl','tri','lat'];
  if(ctx.focus.includes('Pecho'))keys=ctx.hard?['press','row','tri']:['press','row','tri','lat'];
  if(ctx.focus.includes('Core'))keys=ctx.hard?['mobility','core','face']:['core','face','row','mobility'];
  if(ctx.focus.includes('Pierna'))keys=ctx.hard?['hip','mobility','core']:['hip','row','press','core'];
  if(ctx.recovery)keys=['mobility','core','face'];
  return keys.map(k=>{
    let x={...b[k]};
    if(ctx.hard){x.sets=Math.min(2,x.sets);x.note='Día pesado: deja 1-2 repeticiones en reserva.'}
    else x.note='Día normal: controla técnica y sube peso solo si se siente estable.';
    if(ctx.equip.includes('Casa'))x.name=x.alts[x.alts.length-1]||x.name;
    if(ctx.equip.includes('Mancuernas'))x.name=x.alts.find(a=>/mancuerna|mancuernas/.test(a))||x.name;
    return x;
  });
}
function todayRoutinePlan(){
  let r=state.customRoutine;if(!r||!r.days||!r.days.length)return null;
  ensureWeekSchedule();
  let today=todayWeekdayIndex();
  let assign=r.weekSchedule[today];
  if(assign==='rest')return {rest:true};
  return {rest:false,dayIndex:assign,dayName:r.days[assign].day,plan:routineDayPlan(assign)};
}
function createFitnessToday(){
  let ctx=readFitnessContext();
  if(document.getElementById('workFatigue'))document.getElementById('workFatigue').value=ctx.hard?'pesado':'normal';
  if(document.getElementById('prio'))document.getElementById('prio').value=ctx.focus;
  if(document.getElementById('equip'))document.getElementById('equip').value=ctx.equip;
  let tr=todayRoutinePlan();
  let plan,fromSemana=false;
  if(tr&&!tr.rest&&tr.plan&&tr.plan.length){plan=tr.plan;fromSemana=true;ctx.focus=tr.dayName;}
  else{plan=buildFitnessTodayPlan(ctx);}
  state.fitnessToday={date:ctx.date,ctx,plan,createdAt:new Date().toISOString(),fromSemana:fromSemana,semanaDayName:fromSemana?tr.dayName:null};
  save();
  renderFitnessCoach();
}
function renderFitnessCoach(){
  let out=document.getElementById('fitnessCoachOut');if(!out)return;
  let pack=state.fitnessToday&&state.fitnessToday.date===todayISO()?state.fitnessToday:null;
  if(!pack){out.innerHTML='<div class="mini" style="margin-top:10px">Todavía no hay rutina de hoy. Toca "Crear rutina de hoy".</div>';return}
  let ctx=pack.ctx,plan=pack.plan||[];
  // Estado de "hecho" por ejercicio (checklist)

function toggleFitExDone(i){

function replaceFitnessExercise(index,name){

function workoutHistoryForExercise(name){
  let n=String(name||'').toLowerCase();
  return (state.workoutLog||[]).filter(x=>String(x.exercise||'').toLowerCase()===n).slice().sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))||((b.id||0)-(a.id||0)));
}
function lastWorkoutForExercise(name){return workoutHistoryForExercise(name)[0]||null}
function nextWeightAdviceForExercise(name,feel,weight,reps){
  let w=+weight||0, f=String(feel||'Normal').toLowerCase();
  if(f.includes('dolor'))return 'Próxima vez baja peso o cambia ejercicio.';
  if(f.includes('fácil')&&w)return 'Próxima vez prueba subir 5 lb si la técnica estuvo limpia.';
  if(f.includes('pesado'))return 'Próxima vez repite el mismo peso o baja 5 lb.';
  return w?'Próxima vez repite '+w+' lb y busca una repetición más.':'Próxima vez registra el peso para comparar.';
}
function fillLastGuidedWeight(){

function showGuidedExerciseProgress(){

function keepScroll(fn){
  var y=window.scrollY||document.documentElement.scrollTop||0;

  setTimeout(function(){window.scrollTo(0,y);},60);
}

    <h3 style="margin:0 0 3px;font-size:19px">${safeText(x.name)}</h3>
    <div class="muted" style="font-size:12px;margin-bottom:8px">${safeText(x.muscle)} · ${x.sets}×${safeText(x.reps)} · descanso ${x.rest}s${hasTarget?` · 🎯 <b style="color:#15704f">${x.target} lb</b>${x.lastWeight?` <span class="muted">(últ ${x.lastWeight})</span>`:''}`:''}</div>
    <div style="font-size:12px;color:#4a5a52;background:#f4f8f6;border-radius:8px;padding:7px 10px;margin-bottom:8px"><b>Clave:</b> ${safeText(gcue)}. Sube controlado, baja lento.</div>
    ${!hasTarget?`<div class="mini" style="font-size:12px;margin-bottom:8px"><b>Sugerencia:</b> ${safeText(advice)}</div>`:''}

      <button class="btn" style="flex:1;font-size:14px" onclick="moveGuidedWorkout(-1)">◀</button>

function moveGuidedWorkout(delta){
  if(!state.activeWorkout)return;
  let max=(state.activeWorkout.plan||[]).length-1;
  state.activeWorkout.step=Math.max(0,Math.min(max,(state.activeWorkout.step||0)+delta));
  save();keepScroll(function(){renderGuidedWorkout();});
}
function showSwapOptions(){
  let aw=state.activeWorkout;if(!aw)return;
  let i=aw.step||0,x=aw.plan[i];if(!x)return;
  let out=document.getElementById('guidedExtraOut');if(!out)return;
  let alts=(x.alts||[]).filter(a=>a&&a!==x.name);
  if(!alts.length){out.innerHTML='<div class="warn" style="margin-top:10px">Este ejercicio no tiene alternativas guardadas. Puedes saltarlo con “Siguiente”.</div>';setTimeout(function(){if(out.querySelector('.warn'))out.innerHTML='';},4000);return;}
  out.innerHTML=`<div class="card" style="margin-top:10px;border:1.5px solid #9dd5b4;background:#f7fff9">
    <b>🔄 Ocupada la máquina — elige otro para ${safeText(x.muscle)}:</b>
    <div class="list" style="margin-top:8px">${alts.map(a=>`<div class="item"><b>${safeText(a)}</b><div class="row" style="margin-top:6px;gap:6px"><button class="btn primary" style="flex:1" onclick="chooseSwapExercise('${String(a).replace(/'/g,"\\'")}')">Usar este</button><button class="btn" onclick="exerciseHelp('${String(a).replace(/'/g,"\\'")}')">🖼️ Ver</button></div></div>`).join('')}</div>
    <button class="btn" style="width:100%;margin-top:8px" onclick="document.getElementById('guidedExtraOut').innerHTML=''">Cancelar</button>
  </div>`;

function chooseSwapExercise(name){
  let aw=state.activeWorkout;if(!aw)return;
  let i=aw.step||0,x=aw.plan[i];if(!x)return;
  let prev=x.name;
  x.alts=[...(x.alts||[]).filter(a=>a&&a!==name),prev];
  x.name=name;x.note='Cambiado durante la rutina porque estaba ocupado.';
  let sug=(typeof suggestTargetWeight==='function')?suggestTargetWeight(name,x.muscle,x.reps):null;
  if(sug){x.target=sug.target;x.progressText=sug.text;x.lastWeight=sug.last?sug.last.weight:null;}
  save();keepScroll(function(){renderGuidedWorkout();renderFitnessCoach();});
  let out=getFitnessMainOut();
  if(out){let msg=document.createElement('div');msg.className='ok';msg.style.cssText='margin-top:10px;background:#e6f7ee;border:1px solid #9dd5b4;color:#15704f;font-weight:700';msg.innerHTML='🔄 Cambiado a <b>'+safeText(name)+'</b>';out.appendChild(msg);setTimeout(function(){msg.remove();},4000);}
}
function swapCurrentGuidedExercise(){
  let aw=state.activeWorkout;if(!aw)return;
  let i=aw.step||0,x=aw.plan[i];if(!x)return;
  let alts=x.alts||[];
  if(!alts.length){
    // Sin alternativas guardadas: avisa en vez de no hacer nada
    let out=getFitnessMainOut();
    if(out){let msg=document.createElement('div');msg.className='warn';msg.style.marginTop='10px';msg.textContent='Este ejercicio no tiene alternativas guardadas. Puedes saltarlo con Siguiente.';out.appendChild(msg);setTimeout(function(){msg.remove();},3500);}
    return;
  }
  let prev=x.name;
  let next=alts[0];
  x.alts=[...alts.slice(1),x.name];
  x.name=next;x.note='Cambiado durante rutina porque estaba ocupado.';
  save();keepScroll(function(){renderGuidedWorkout();renderFitnessCoach();});
  // Aviso claro del cambio
  let out=getFitnessMainOut();
  if(out){let msg=document.createElement('div');msg.className='ok';msg.style.cssText='margin-top:10px;background:#e6f7ee;border:1px solid #9dd5b4;color:#15704f;font-weight:700';msg.innerHTML='🔄 Cambiado: <b>'+prev+'</b> → <b>'+next+'</b>';out.appendChild(msg);setTimeout(function(){msg.remove();},4000);}
}
function saveGuidedWorkoutStep(){
  let aw=state.activeWorkout;if(!aw)return;
  let stepIndex=aw.step||0,x=aw.plan[stepIndex];if(!x)return;
  let weight=+document.getElementById('guidedWeight')?.value||0,reps=document.getElementById('guidedReps')?.value||x.reps,feel=document.getElementById('guidedFeel')?.value||'Normal';
  let note=`Paso guiado · ${feel}. ${nextWeightAdviceForExercise(x.name,feel,weight,reps)} ${x.note||''}`;
  state.workoutLog.push({date:todayISO(),exercise:x.name,weight,sets:+x.sets||1,reps,note,id:Date.now()});
  aw.doneSteps=aw.doneSteps||{};
  aw.doneSteps[stepIndex]={name:x.name,weight,reps,feel,at:new Date().toISOString()};
  aw.done=Object.values(aw.doneSteps);
  if(stepIndex < aw.plan.length-1){
    aw.step=stepIndex+1;
    aw.lastMessage='Guardado: '+x.name+'. Ahora sigue el siguiente ejercicio.';
  }else{
    aw.lastMessage='Guardado: '+x.name+'. Ya llegaste al final; toca Terminar para cerrar la rutina.';
  }
  save();keepScroll(function(){renderGuidedWorkout();renderWorkoutLog();renderFitnessProgressPanel();});
}
function finishGuidedWorkout(){
  if(!state.activeWorkout)return;
  let aw=state.activeWorkout;
  let count=(aw.done||[]).length;
  let advanced='';
  if(aw.fromRoutine&&state.customRoutine&&state.customRoutine.days){
    let r=state.customRoutine;
    r.history=r.history||[];
    r.history.unshift({date:todayISO(),dayIndex:aw.routineDayIndex,dayName:aw.routineDayName||('Día '+((aw.routineDayIndex||0)+1))});
    r.history=r.history.slice(0,30);
    let nextDay=(((aw.routineDayIndex||0)+1)%r.days.length);
    r.currentDay=nextDay;
    advanced=' La próxima sesión te tocará el Día '+(nextDay+1)+': '+safeText(r.days[nextDay].day)+'.';
  }
  aw.finishedAt=new Date().toISOString();
  state.activeWorkout=null;
  save();
  let out=getFitnessMainOut();if(out)out.innerHTML=`<div class="ok" style="margin-top:12px"><b>Rutina terminada.</b> Guardaste ${count} ejercicio(s). Come algo con proteína y agua.${advanced}</div>`;

}

let _logView = 'all';

function renderWorkoutLog(){
  if(!state.workoutLog) state.workoutLog=[];

    if(filter&&x.exercise!==filter)return false;

  }

  const muscleMap={
    'Press inclinado':'Pecho','Press plano':'Pecho','Press militar':'Hombros','Fondos':'Pecho/Tríceps',

    'Elevaciones laterales':'Hombros','Press Arnold':'Hombros',
    'Curl bíceps':'Bíceps','Tríceps cuerda':'Tríceps','Curl martillo':'Bíceps',
    'Plancha':'Core','Crunch cable':'Core','Crunch suelo':'Core',
    'Hip thrust':'Glúteos','Sentadilla goblet':'Pierna','Peso muerto sumo':'Pierna/Glúteos',
    'Push up':'Pecho/Tríceps',
  };

  el.innerHTML = chartHtml + Object.entries(byDate).map(([date,entries])=>`
    <div style="margin-bottom:14px">
      <div style="font-weight:900;font-size:14px;color:var(--g);margin-bottom:6px;padding:6px 0;border-bottom:2px solid #e0f0e5;display:flex;justify-content:space-between">

function monthlyExpenseValue(x){
  let amount=+x.total||0;
  if(x.frequency==='weekly')return amount*4.33;
  if(x.frequency==='yearly')return amount/12;
  if(x.frequency==='monthly')return amount;
  return 0;
}
function recurringExpenseGroups(){
  let groups=new Map();
  state.expenses.filter(x=>x.frequency&&x.frequency!=='once').forEach(x=>{
    let key=(x.store||'').trim().toLowerCase()+'|'+x.cat;
    let current=groups.get(key);
    if(!current||String(x.d)>String(current.d))groups.set(key,x);
  });
  return [...groups.values()];
}
function renderSavingsAnalyzer(){
  let out=document.getElementById('savingsAnalyzer');if(!out)return;
  let recurring=recurringExpenseGroups();
  let candidates=recurring.filter(x=>!x.stopped&&(x.need||defaultExpenseNeed(x.cat))!=='essential');
  let cancelMonthly=candidates.filter(x=>(x.need||defaultExpenseNeed(x.cat))==='cancel').reduce((a,x)=>a+monthlyExpenseValue(x),0);
  let reduceMonthly=candidates.filter(x=>(x.need||defaultExpenseNeed(x.cat))==='reduce').reduce((a,x)=>a+monthlyExpenseValue(x)*.3,0);
  let currentMonth=new Date().toISOString().slice(0,7);
  let oneTime=state.expenses.filter(x=>!x.stopped&&(x.frequency||'once')==='once'&&String(x.d).startsWith(currentMonth)&&(x.need||defaultExpenseNeed(x.cat))!=='essential');
  let avoidableOnce=oneTime.reduce((a,x)=>a+(x.need==='cancel'?x.total:x.total*.3),0);
  let potential=cancelMonthly+reduceMonthly;
  let stopped=recurring.filter(x=>x.stopped);
  out.innerHTML=`<div class="card">
    <h3 style="margin-top:0">✂️ Plan para ahorrar</h3>
    <div class="grid">
      <div class="mini"><div class="kpi">${money(cancelMonthly)}</div>Suscripciones/gastos cancelables al mes</div>
      <div class="mini"><div class="kpi">${money(reduceMonthly)}</div>Reduciendo 30% de gastos flexibles</div>
      <div class="mini"><div class="kpi">${money(potential)}</div>Ahorro mensual posible</div>
      <div class="mini"><div class="kpi">${money(potential*12)}</div>Ahorro anual posible</div>
    </div>
    ${avoidableOnce?`<div class="warn" style="margin-top:10px">Este mes también registraste ${money(avoidableOnce)} que podrías evitar o reducir en compras no recurrentes.</div>`:''}
    <p class="muted">La app nunca recomienda cancelar renta, salud, seguros, deudas o servicios esenciales. Revisa contratos y penalizaciones antes de cancelar.</p>
  </div>
  <div class="card"><h3 style="margin-top:0">Revisar primero</h3>
    ${candidates.length?candidates.sort((a,b)=>monthlyExpenseValue(b)-monthlyExpenseValue(a)).map(x=>{
      let need=x.need||defaultExpenseNeed(x.cat),monthly=monthlyExpenseValue(x),saving=need==='cancel'?monthly:monthly*.3;
      return `<div class="item row"><div style="flex:1"><b>${catEmoji[x.cat]||'📦'} ${safeText(x.store)}</b><br><span class="muted">${expenseFrequencyLabel(x.frequency)} · ${expenseNeedLabel(need)} · equivale a ${money(monthly)}/mes</span><br><b>Posible ahorro: ${money(saving)}/mes</b></div><button class="btn" onclick="stopRecurringExpense(${x.id})">Dejar de pagar</button></div>`;
    }).join(''):'<div class="ok">No tienes pagos recurrentes reducibles o cancelables registrados.</div>'}
  </div>
  ${stopped.length?`<div class="card"><h3 style="margin-top:0">Pagos detenidos</h3>${stopped.map(x=>`<div class="item row"><span style="flex:1"><b>${safeText(x.store)}</b> · ahorro ${money(monthlyExpenseValue(x))}/mes</span><button class="btn" onclick="restoreRecurringExpense(${x.id})">Reactivar</button></div>`).join('')}</div>`:''}`;
}

function receiptCatOptions(selected){
  let cats=Object.keys(catEmoji).concat(['impuesto fees']);

  return cats.map(c=>`<option value="${safeText(c)}" ${c===selected?'selected':''}>${catEmoji[c]||'🧾'} ${safeText(c)}</option>`).join('');
}
function inferReceiptCategory(text){
  let s=(' '+String(text||'').toLowerCase()+' ').replace(/[^a-z0-9\s]/g,' ');
  let best={cat:'otro',es:'Otro',score:0};
  receiptCategoryRules.forEach(rule=>{
    let score=rule.words.reduce((a,w)=>a+(s.includes(' '+w.toLowerCase()+' ')?1:0),0);
    if(score>best.score)best={cat:rule.cat,es:rule.es,score};
  });
  return best;
}
function normalizeReceiptLine(line){
  return String(line||'').replace(/\s+/g,' ').trim();
}
function parseReceiptMoney(line){
  let clean=String(line||'').replace(/[,]/g,'');
  let matches=[...clean.matchAll(/(?:\$)?(-?\d+\.\d{2})\b/g)].map(m=>m[1]);
  if(!matches.length)return null;
  return Math.abs(+matches[matches.length-1]);
}
function parseReceiptDate(text){
  let m=String(text||'').match(/\b(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})\b/);
  if(!m)return new Date().toISOString().slice(0,10);
  let mm=m[1].padStart(2,'0'),dd=m[2].padStart(2,'0'),yy=m[3].length===2?'20'+m[3]:m[3];
  return `${yy}-${mm}-${dd}`;
}
function detectReceiptStore(lines){
  let joined=lines.slice(0,8).join(' ').toLowerCase();
  if(joined.includes('walmart'))return'Walmart';
  if(joined.includes('costco'))return'Costco Maui';
  if(joined.includes('safeway'))return'Safeway';
  if(joined.includes('target'))return'Target';
  if(joined.includes('foodland'))return'Foodland';
  if(joined.includes('times'))return'Times Supermarket';
  if(joined.includes('longs')||joined.includes('cvs'))return'Longs CVS';
  let first=lines.find(x=>/[a-zA-Z]/.test(x)&&!/\d+\.\d{2}/.test(x));
  return first?first.slice(0,40):'Ticket pegado';
}
function analyzeReceiptText(){
  let raw=document.getElementById('receiptText')?.value||'';
  let out=document.getElementById('receiptParsedOut'),sum=document.getElementById('receiptParseSummary');
  if(!raw.trim()){alert('Pega el texto del ticket primero.');return}
  let lines=raw.split(/\r?\n/).map(normalizeReceiptLine).filter(Boolean);
  let store=detectReceiptStore(lines);
  let date=parseReceiptDate(raw);
  let storeEl=document.getElementById('receiptStore');if(storeEl&&!storeEl.value)storeEl.value=store;
  let dateEl=document.getElementById('receiptDate');if(dateEl&&!dateEl.value)dateEl.value=date;
  let skip=/\b(subtotal|balance|change|cash|visa|mastercard|amex|debit|credit|approved|auth|card|account|cashier|terminal|receipt|member|thank you|items sold|total saved|coupon|payment)\b/i;
  let totalLine=lines.find(l=>/\b(total|amount due|balance due)\b/i.test(l)&&parseReceiptMoney(l));
  let taxLine=lines.find(l=>/\b(tax|sales tax)\b/i.test(l)&&parseReceiptMoney(l));
  parsedReceiptItems=[];
  lines.forEach((line,idx)=>{
    let amount=parseReceiptMoney(line);
    if(amount===null)return;
    if(skip.test(line)&&!/\b(tax|fee|deposit|crv|hi5)\b/i.test(line))return;
    if(totalLine&&line===totalLine)return;
    if(taxLine&&line===taxLine)return;
    let name=line.replace(/(?:\$)?-?\d+\.\d{2}\b/g,'').replace(/\b(F|T|N|X)\b/g,'').trim();
    if(name.length<2)return;
    let info=inferReceiptCategory(name);
    parsedReceiptItems.push({id:Date.now()+idx,name,amount,cat:info.cat,spanish:info.es,raw:line,include:true,priceSource:'REAL'});
  });
  if(taxLine&&parseReceiptMoney(taxLine)){
    parsedReceiptItems.push({id:Date.now()+999,name:'Sales tax / impuesto',amount:parseReceiptMoney(taxLine),cat:'impuesto fees',spanish:'Impuesto/fees',raw:taxLine,include:true,priceSource:'REAL'});
  }
  let parsedTotal=parsedReceiptItems.reduce((a,x)=>a+(x.include?x.amount:0),0);
  let receiptTotal=totalLine?parseReceiptMoney(totalLine):0;
  if(sum)sum.innerHTML=`<div class="ok"><b>${parsedReceiptItems.length} líneas detectadas.</b> Total leído por líneas: ${money(parsedTotal)}${receiptTotal?` · Total del ticket: ${money(receiptTotal)} · Diferencia: ${money(receiptTotal-parsedTotal)}`:''}</div>`;
  renderParsedReceiptTable();
}
async function analyzeReceiptWithAI(){

    });
    if(sum)sum.innerHTML=`<div class="ok"><b>IA terminó.</b> ${parsedReceiptItems.filter(x=>x.priceSource!=='REVISAR').length} precios reales detectados · ${parsedReceiptItems.filter(x=>x.priceSource==='REVISAR').length} por revisar. Total IA: ${money(parsedReceiptItems.filter(x=>x.priceSource!=='REVISAR').reduce((a,x)=>a+x.amount,0))}</div>`;
    renderParsedReceiptTable();
  }catch(err){
    if(sum)sum.innerHTML=`<div class="warn"><b>IA no disponible:</b> ${safeText(err.message)}. Puedes usar “Analizar texto” sin API o revisar que Netlify tenga OPENAI_API_KEY.</div>`;

}

function importData(){
  let input=$('#importFile'),file=input?.files?.[0];if(!file){alert('Selecciona un archivo JSON.');return}
  let reader=new FileReader();
  reader.onload=async()=>{
    try{
      let incoming=JSON.parse(reader.result);
      if(!incoming||typeof incoming!=='object'||Array.isArray(incoming))throw new Error('El archivo no contiene un respaldo válido.');
      let summary=`Peso: ${(incoming.weight||[]).length}\\nGastos: ${(incoming.expenses||[]).length}\\nComidas registradas: ${(incoming.meals||[]).length}\\nFotos de progreso: ${(incoming.progressPhotos||[]).length}\\n\\nReemplazar los datos actuales?`;
      if(!confirm(summary))return;
      await saveVersionSnapshot(JSON.stringify(state),'antes-importar-'+new Date().toISOString());
      state=incoming;state.schemaVersion=APP_SCHEMA_VERSION;state.appVersion=window.HM_APP_VERSION||'44.0.0';save();render();alert('Respaldo importado correctamente.');
    }catch(error){alert('No se pudo importar: '+error.message)}

}
let graficaActiva='peso';
function showGTab(tipo){
  graficaActiva=tipo;
  ['peso','pasos','calorias','rutinas'].forEach((t,i)=>{
    let b=document.querySelector('#gTab'+(i+1));
    if(b) b.className=t==tipo?'btn primary':'btn';
  });

}
function drawGrafica(){
  let canvas=document.querySelector('#graficaCanvas'), empty=document.querySelector('#graficaEmpty'), stats=document.querySelector('#graficaStats');
  if(!canvas) return;
  let tipo=graficaActiva;
  let datos=[];
  if(tipo=='peso') datos=state.weight.slice(-20).map(x=>({label:x.d.slice(5),val:x.w,unit:'lb'}));
  if(tipo=='pasos') datos=state.walks.slice(-20).map(x=>({label:x.d.slice(5),val:x.steps,unit:'pasos'}));
  if(tipo=='calorias') datos=state.walks.slice(-20).map(x=>({label:x.d.slice(5),val:Math.round(x.cal),unit:'kcal'}));
  if(tipo=='rutinas') datos=state.routines.slice(-20).map((x,i)=>({label:x.date.slice(5),val:i+1,unit:'rutina'}));
  if(!datos.length){canvas.style.display='none';empty.style.display='block';if(stats)stats.innerHTML='';return;}
  canvas.style.display='block'; empty.style.display='none';
  let W=canvas.offsetWidth||320, H=220;
  canvas.width=W; canvas.height=H;
  let ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  let pad={t:20,r:16,b:40,l:52};
  let vals=datos.map(d=>d.val);
  let mn=Math.min(...vals), mx=Math.max(...vals);
  let range=mx-mn||1;
  let gW=W-pad.l-pad.r, gH=H-pad.t-pad.b;
  ctx.strokeStyle='#d9e3db'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    let y=pad.t+gH*(1-i/4);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#63706a'; ctx.font='11px system-ui'; ctx.textAlign='right';
    ctx.fillText(Math.round(mn+range*i/4), pad.l-4, y+4);
  }
  let pts=datos.map((d,i)=>({
    x: pad.l+(datos.length>1?i/(datos.length-1):0.5)*gW,
    y: pad.t+gH*(1-(d.val-mn)/range)
  }));
  ctx.beginPath();
  pts.forEach((p,i)=>i==0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle='#15704f'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pad.t+gH);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x, pad.t+gH);
  ctx.closePath();
  let grad=ctx.createLinearGradient(0,pad.t,0,pad.t+gH);
  grad.addColorStop(0,'rgba(21,112,79,0.20)'); grad.addColorStop(1,'rgba(21,112,79,0)');
  ctx.fillStyle=grad; ctx.fill();
  let step=Math.max(1,Math.floor(datos.length/6));
  pts.forEach((p,i)=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fillStyle='#15704f'; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    if(i%step==0||i==datos.length-1){
      ctx.fillStyle='#63706a'; ctx.font='10px system-ui'; ctx.textAlign='center';
      ctx.fillText(datos[i].label, p.x, H-pad.b+14);
    }
  });
  let last=pts[pts.length-1], lastD=datos[datos.length-1];
  ctx.fillStyle='#15704f'; ctx.font='bold 12px system-ui'; ctx.textAlign='center';
  let labelY=last.y-12; if(labelY<pad.t+12) labelY=last.y+18;
  ctx.fillText(lastD.val+' '+lastD.unit, last.x, labelY);
  let avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  let diff=vals.length>1?vals[vals.length-1]-vals[0]:0;
  let trend=vals.length>1?(diff>0?'↑ +'+Math.abs(diff.toFixed(1)):'↓ -'+Math.abs(diff.toFixed(1))):'—';
  if(stats) stats.innerHTML=
    '<div class="mini"><b>Mínimo</b><div class="kpi" style="font-size:18px">'+Math.min(...vals)+'</div></div>'+
    '<div class="mini"><b>Máximo</b><div class="kpi" style="font-size:18px">'+Math.max(...vals)+'</div></div>'+
    '<div class="mini"><b>Promedio</b><div class="kpi" style="font-size:18px">'+avg+'</div></div>'+
    '<div class="mini"><b>Cambio</b><div class="kpi" style="font-size:18px">'+trend+'</div></div>'+
    '<div class="mini"><b>Registros</b><div class="kpi" style="font-size:18px">'+vals.length+'</div></div>';
}

function getAutoMealKey(){

}

  state.diary[date][key].push({name:decodeURIComponent(String(name||'')),kcal:Math.round(+kcal||0),prot:+prot||0,carb:+carb||0,fat:+fat||0,amount:amount||'1 porción',id:Date.now()});

function makeSmartShoppingFromPicked(){

  let hasFat=picked.some(x=>['aguacate','crema de cacahuate','aceite de oliva','queso','mantequilla'].includes(x));

<script>
/* ===== v41.26 Ajustes limpios + perfil con pasos diarios ===== */
(function(){
  try{
    if(typeof state==='undefined') return;
    window.HM_APP_VERSION='44.0.0';
    if(state.profile){
      state.profile.pasosDia = +(state.profile.pasosDia||0) || 22000;
      state.profile.sexo = state.profile.sexo || 'hombre';
      state.profile.objetivo = state.profile.objetivo || 'ganar peso';
    }

    function v4124Today(){return (typeof todayISO==='function')?todayISO():new Date().toISOString().slice(0,10)}
    function v4124AvgSteps(){
      var walks=(state.walks||[]).slice(-7).map(function(x){return +x.steps||0}).filter(Boolean);
      if(walks.length) return Math.round(walks.reduce(function(a,b){return a+b},0)/walks.length);
      return +(state.profile&&state.profile.pasosDia)||22000;
    }
    function v4124Selected(value, target){return String(value||'')===String(target||'')?' selected':''}
    function v4124MoneySafe(n){return (typeof money==='function')?money(n):('$'+(+n||0).toFixed(2))}
    function v4124CleanNum(n){return Math.round(+n||0).toLocaleString('en-US')}
    function v4124ScrollTo(id){
      setTimeout(function(){var el=document.getElementById(id); if(el){el.scrollIntoView({behavior:'smooth',block:'start'});}},50);
    }

    window.setProfileSteps=function(v){
      var input=document.getElementById('pasosDia');
      if(input) input.value=v;
      if(state.profile) state.profile.pasosDia=+v||22000;
      if(typeof save==='function') save();
      if(typeof calcMacros==='function') calcMacros();
      v4124ScrollTo('macroOut');
    };

    window.calcMacros=function(){
      var peso=+((document.getElementById('peso')||{}).value)||+(state.profile&&state.profile.peso)||150;
      var altura=+((document.getElementById('altura')||{}).value)||+(state.profile&&state.profile.altura)||170;
      var edad=+((document.getElementById('edad')||{}).value)||+(state.profile&&state.profile.edad)||30;
      var sexo=((document.getElementById('sexo')||{}).value)||(state.profile&&state.profile.sexo)||'hombre';
      var objetivo=((document.getElementById('objetivo')||{}).value)||(state.profile&&state.profile.objetivo)||'ganar peso';
      var pasos=+((document.getElementById('pasosDia')||{}).value)||v4124AvgSteps()||22000;
      var kg=peso*.45359237;
      var bmr=Math.round(10*kg + 6.25*altura - 5*edad + (sexo==='mujer'?-161:5));
      var mult=pasos>=28000?2.18:pasos>=22000?2.05:pasos>=16000?1.88:pasos>=10000?1.68:pasos>=6000?1.52:1.38;
      var ajuste=objetivo.includes('bajar')?-300:(objetivo.includes('mantener')?0:350);
      var cal=Math.max(1600,Math.round((bmr*mult+ajuste)/25)*25);
      var prot=Math.round(kg*(objetivo.includes('bajar')?2.0:1.9));
      var fat=Math.round(kg*.9);
      var carb=Math.max(120,Math.round((cal-prot*4-fat*9)/4));
      var pasoTxt=pasos>=28000?'día muy pesado':pasos>=22000?'jardinería fuerte':pasos>=16000?'actividad alta':pasos>=10000?'activo normal':'día suave';
      Object.assign(state.profile,{peso:peso,altura:altura,edad:edad,sexo:sexo,objetivo:objetivo,pasosDia:pasos,calorias:cal,proteina:prot,grasa:fat,carbos:carb,bmr:bmr,activityMultiplier:mult});
      var out=document.getElementById('macroOut');
      if(out){
        out.innerHTML=`<div class="macro-result-clean">
          <div class="macro-result-head">
            <div><b>Resultado para ${safeText(objetivo)}</b><span>Con ${v4124CleanNum(pasos)} pasos/día · ${safeText(pasoTxt)}</span></div>
            <button class="btn" onclick="openTab('🍱 Contador')">Registrar comida</button>
          </div>
          <div class="macro-big-grid">
            <div class="macro-big"><b>${v4124CleanNum(cal)}</b><span>calorías al día</span></div>
            <div class="macro-big"><b>${prot}g</b><span>proteína</span></div>
            <div class="macro-big"><b>${carb}g</b><span>carbohidratos</span></div>
            <div class="macro-big"><b>${fat}g</b><span>grasas</span></div>
