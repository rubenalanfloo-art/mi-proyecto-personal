function openPersonalDB(){
  return new Promise((resolve,reject)=>{
    if(!window.indexedDB){reject(new Error('IndexedDB no disponible'));return}
    let request=indexedDB.open(PP_DB_NAME,PP_DB_VERSION);
    request.onupgradeneeded=event=>{
      let db=event.target.result;
      if(!db.objectStoreNames.contains('data'))db.createObjectStore('data');
      if(!db.objectStoreNames.contains('backups'))db.createObjectStore('backups');
      if(!db.objectStoreNames.contains('media'))db.createObjectStore('media');
    };
    request.onsuccess=()=>resolve(request.result);
    request.onerror=()=>reject(request.error||new Error('No se pudo abrir IndexedDB'));
  });
}
async function persistStateIDB(json){

function tabAllowed(tabName){

function showGroup(gid,shouldScroll=true){
  _activeGroup = gid;

function hmForceTopScroll(behavior='smooth'){
  // Fix iPhone/Safari: scrollIntoView() with sticky headers can stop in the middle.
  // This forces the real page scroller to the very top after the tab finishes rendering.
  let root=document.scrollingElement||document.documentElement||document.body;
  function run(mode){
    let b=mode||behavior;
    try{window.scrollTo({top:0,left:0,behavior:b});}catch(e){try{window.scrollTo(0,0);}catch(e2){}}
    try{root.scrollTo({top:0,left:0,behavior:b});}catch(e){try{root.scrollTop=0;}catch(e2){}}
    try{document.documentElement.scrollTop=0;}catch(e){}
    try{document.body.scrollTop=0;}catch(e){}
  }
  run();
  try{requestAnimationFrame(()=>run());}catch(e){}
  setTimeout(()=>run(),80);
  setTimeout(()=>run('auto'),240);
}
function scrollActiveTabTop(){
  setTimeout(()=>hmForceTopScroll('smooth'),60);
}
function updateBackButton(){
  let btn=document.getElementById('backTabBtn');
  if(!btn)return;
  if(!_tabHistory.length||_activeTab===0){
    btn.style.display='none';
    if(_activeTab===0)_tabHistory=[];

  }
  let prev=_tabHistory[_tabHistory.length-1];
  let label=tabs[prev.tab]||'Inicio';
  btn.textContent='← Atrás a '+label.replace(/^[^\wÁÉÍÓÚÑáéíóúñ]+\s*/,'');
  btn.style.display='inline-flex';
}
function goBackTab(){
  let prev=_tabHistory.pop();

}
function openTab(tab,saveHistory=true){
  let i=typeof tab==='number'?tab:tabs.indexOf(tab);
  if(i<0)return;
  if(saveHistory&&i!==_activeTab)_tabHistory.push({tab:_activeTab,group:_activeGroup});
  let group=GROUPS.find(g=>g.tabs.includes(tabs[i]));
  if(group&&group.id!==_activeGroup)showGroup(group.id,false);
  setTimeout(()=>{showTab(i,document.getElementById('stab_'+i));scrollActiveTabTop();},20);
}

function addPortableSet(format,count,bases,type='comida',method='sin cocinar',hot=false){
  let made=0;
  for(let b of bases)for(let p of portableProteins)for(let e of portableExtras){
    if(made>=count)return;
    let name=`${format} de ${p.n} con ${e.n}`;
    let ingredients=`${b.ing}, ${p.ing}, ${e.ing}, 50g tomate, 25g cebolla`;
    let steps=hot
      ?[`Calienta ${b.label} según el método indicado.`,`Agrega ${p.n} y calienta completamente.`,`Añade ${e.n}, tomate y cebolla.`,`Empaca o sirve; divide en dos porciones si tienes poco apetito.`]
      :[`Coloca ${b.label} sobre una superficie limpia.`,`Distribuye ${p.n} y ${e.n}.`,`Agrega tomate y cebolla; cierra firmemente.`,`Envuelve y mantén frío hasta comer.`];
    add(type,name,8+made%8,b.k+p.k+e.k+30,b.p+p.p+e.p,b.c+p.c+e.c+.40,steps,method,`portable jardinero ${format.toLowerCase()} ${hot?'termo caliente':'hielera frío rápido'}`,hot?'Mantener a 60°C o más':'Mantener a 4°C o menos',ingredients);
    made++;
  }
}

<details open><summary>1. Inicio rápido: mi primera preparación</summary><div class="card">
  <ol>
    <li>Coloca la TM5 sobre una superficie firme, plana, limpia y lejos del borde.</li>
    <li>Comprueba que las cuchillas y la base del vaso estén correctamente bloqueadas y sin fugas.</li>
    <li>Inserta el vaso limpio y completamente seco por fuera.</li>
    <li>Agrega ingredientes sin superar la marca máxima de <b>2.2 L</b>.</li>
    <li>Coloca la tapa y el cubilete, o el accesorio solicitado.</li>
    <li>En la pantalla selecciona <b>tiempo → temperatura → velocidad</b>.</li>
    <li>Gira el selector lentamente para iniciar. Con comida caliente aumenta la velocidad de manera gradual.</li>
    <li>Al terminar, coloca velocidad en 0 y espera a que los brazos liberen la tapa.</li>
  </ol>
</div></details>

<details><summary>2. Partes y para qué sirve cada una</summary><div class="card"><div class="grid">
  <div class="mini"><b>Vaso mezclador</b><br>Recipiente de acero donde pesa, mezcla y cocina. Capacidad máxima: 2.2 L.</div>
  <div class="mini"><b>Tapa</b><br>Cierra el vaso y contiene el bocal. El borde debe estar limpio para cerrar correctamente.</div>
  <div class="mini"><b>Bocal</b><br>Orificio central de la tapa. Permite agregar ingredientes y liberar vapor de forma controlada.</div>
  <div class="mini"><b>Cubilete</b><br>Pequeña taza que cubre el bocal, reduce salpicaduras y sirve para medir cantidades pequeñas.</div>
  <div class="mini"><b>Cuchillas</b><br>Pican, mezclan y trituran. Son muy afiladas; sujétalas por la parte superior al retirarlas.</div>
  <div class="mini"><b>Cestillo</b><br>Cocina arroz, papas o huevos dentro del vaso; también puede cubrir el bocal cuando una receta lo indique.</div>
  <div class="mini"><b>Mariposa</b><br>Bate, monta y mezcla delicadamente. No excedas velocidad 4.</div>
  <div class="mini"><b>Varoma</b><br>Recipiente superior para cocinar al vapor. Deja algunas ranuras libres y abre la tapa alejándola del rostro.</div>
  <div class="mini"><b>Espátula oficial</b><br>Ayuda a bajar ingredientes y retirar el cestillo. No introduzcas otros utensilios con las cuchillas en movimiento.</div>
  <div class="mini"><b>Selector</b><br>Gira para modificar valores e iniciar; presión prolongada permite reiniciar si la unidad no responde.</div>
</div></div></details>

<details><summary>3. Velocidades, giro inverso y modos</summary><div class="card">
  <table class="table"><thead><tr><th>Ajuste</th><th>Uso inicial</th><th>Ejemplo</th></tr></thead><tbody>
    <tr><td>Velocidad cuchara</td><td>Mover suavemente mientras cocina</td><td>Sopas con trozos</td></tr>
    <tr><td>Velocidad 1-3</td><td>Mezclar sin triturar demasiado</td><td>Carne cocida, guisos</td></tr>
    <tr><td>Velocidad 4-5</td><td>Trocear y picar</td><td>Cebolla, verduras</td></tr>
    <tr><td>Velocidad 6-8</td><td>Triturar y licuar progresivamente</td><td>Salsas y purés</td></tr>
    <tr><td>Velocidad 9-10</td><td>Triturado fino en preparaciones frías o seguras</td><td>Azúcar o ingredientes secos</td></tr>
    <tr><td>Giro inverso</td><td>Las cuchillas giran por el lado sin filo</td><td>Pasta, arroz y carne que no quieres deshacer</td></tr>
    <tr><td>Amasar</td><td>Movimiento especial para masas; no usar si el vaso está a más de 60°C</td><td>Pan y pizza</td></tr>
    <tr><td>Turbo</td><td>Pulsos muy rápidos solamente cuando sea apropiado</td><td>Ingredientes duros y fríos; nunca comida caliente</td></tr>
  </tbody></table>
</div></details>

<details><summary>4. Temperaturas y cuándo usarlas</summary><div class="card">
  <table class="table"><thead><tr><th>Temperatura</th><th>Uso orientativo</th></tr></thead><tbody>
    <tr><td>Sin temperatura</td><td>Picar, mezclar, amasar o licuar preparaciones frías.</td></tr>
    <tr><td>37°C</td><td>Templar líquidos o activar levadura según la receta.</td></tr>
    <tr><td>50-70°C</td><td>Fundir chocolate o calentar suavemente.</td></tr>
    <tr><td>80-98°C</td><td>Salsas, cremas y cocción controlada.</td></tr>
    <tr><td>100°C</td><td>Hervir agua, caldos y cocer alimentos.</td></tr>
    <tr><td>120°C</td><td>Sofreír con poca humedad según la receta.</td></tr>
    <tr><td>Varoma</td><td>Generar vapor para el recipiente Varoma.</td></tr>
  </tbody></table>
  <div class="warn">La temperatura configurada no sustituye comprobar la temperatura interna de carnes. Para sobras y carne ya cocida usa como referencia segura 74°C internos.</div>
</div></details>

<details><summary>5. Cómo pesar correctamente</summary><div class="card">
  <ol><li>Deja la base sin tocar paredes, cables ni objetos.</li><li>Coloca el vaso y pulsa el icono de báscula.</li><li>Pulsa tara antes de cada ingrediente que quieras medir por separado.</li><li>Agrega lentamente; si te pasas, retira antes de volver a tarar.</li><li>No arrastres ni presiones la máquina durante el pesaje.</li></ol>
</div></details>

<details><summary>6. Seguridad imprescindible</summary><div class="card">
  <ul>
    <li>No superes la línea máxima de 2.2 L del vaso ni la del cestillo.</li>
    <li>Con alimentos a más de 60°C usa velocidades bajas, aumenta gradualmente y nunca uses Turbo.</li>
    <li>No fuerces la tapa: espera velocidad 0 y que el mecanismo se desbloquee.</li>
    <li>No bloquees el bocal con toallas, trapos ni objetos.</li>
    <li>Al retirar Varoma, conserva la tapa colocada y después inclínala en dirección opuesta a tu cara.</li>
    <li>No uses mariposa por encima de velocidad 4 ni introduzcas la espátula con ella colocada.</li>
    <li>Mantén la unidad lejos del borde; al amasar o triturar puede moverse.</li>
    <li>No sumerjas la base eléctrica. Desconecta antes de limpiar o retirar piezas.</li>
  </ul>
</div></details>

<details><summary>7. Limpieza después de cocinar</summary><div class="card">
  <ol>
    <li>Espera a que el vaso se enfríe si estuvo muy caliente.</li>
    <li>Retira los restos con la espátula, con la velocidad en 0.</li>
    <li>Para enjuague rápido agrega aproximadamente 500 ml de agua y una gota pequeña de jabón.</li>
    <li>Coloca tapa y cubilete; mezcla 20-30 segundos, velocidad 5. No uses este método si hay exceso de espuma.</li>
    <li>Enjuaga y seca muy bien los contactos y la parte exterior antes de volver a colocar el vaso.</li>
    <li>Revisa periódicamente cuchillas, sello, tapa, cable y accesorios; no uses piezas dañadas.</li>
  </ol>
</div></details>

<details><summary>8. Problemas y mensajes frecuentes</summary><div class="card"><div class="grid">
  <div class="mini"><b>No cierra</b><br>Velocidad en 0, borde limpio, tapa bien asentada y vaso correctamente colocado. No fuerces los brazos.</div>
  <div class="mini"><b>No pesa bien</b><br>Superficie plana; nada debe tocar la máquina. Retira objetos y vuelve a tarar.</div>
  <div class="mini"><b>Vaso no reconocido</b><br>Retira, seca contactos y vuelve a colocar. Si se repite, consulta servicio.</div>
  <div class="mini"><b>Motor se detiene</b><br>Puede haber exceso de cantidad o mezcla demasiado espesa. Sigue el mensaje de pantalla y deja enfriar.</div>
  <div class="mini"><b>Mensaje 224</b><br>El vaso está demasiado caliente para Amasar; deja bajar de 60°C.</div>
  <div class="mini"><b>Mensaje 225</b><br>El contenido está demasiado caliente para Turbo. No intentes forzarlo.</div>
  <div class="mini"><b>Fuga debajo del vaso</b><br>Desconecta, no lo coloques en la base y revisa cuchilla, sello y bloqueo inferior.</div>
  <div class="mini"><b>No responde</b><br>Mantén presionado el selector unos 10 segundos, espera y vuelve a encender. No restablezcas de fábrica sin necesidad.</div>
</div></div></details>

</div></details>

<details><summary>10. Diccionario rápido</summary><div class="card"><div class="grid">

function showTM5GuideSetting(){
  let action=document.getElementById('tmGuideAction')?.value||'picar';
  let food=document.getElementById('tmGuideFood')?.value||'normal';
  let plans={
    picar:['5 segundos · velocidad 5','Corta piezas grandes, coloca en el vaso, ejecuta y revisa. Repite 1-2 segundos si falta.'],
    triturar:['20-30 segundos · velocidad 5 a 8 progresiva','Coloca tapa y cubilete. Empieza en 5 y aumenta poco a poco; baja restos con la espátula y repite si hace falta.'],
    mezclar:['10-20 segundos · giro inverso · velocidad 2-3','Usa giro inverso para conservar trozos. Revisa sin prolongar innecesariamente.'],
    sofreir:['5 minutos · 120°C · giro inverso · velocidad cuchara','Pica primero cebolla o ajo, baja restos, agrega aceite y sofríe. Ajusta tiempo según cantidad y humedad.'],
    cocer:['Tiempo de la receta · 100°C · giro inverso · velocidad cuchara','Agrega líquido sin superar 2.2 L, coloca tapa y el accesorio indicado para controlar salpicaduras y vapor.'],
    calentar:['Tiempo necesario · 90-100°C · giro inverso · velocidad cuchara','Recalienta de forma uniforme y comprueba 74°C internos si contiene carne o sobras.'],
    amasar:['1-3 minutos · función Amasar','No llenes en exceso. El vaso debe estar por debajo de 60°C y la máquina lejos del borde.'],
    batir:['Mariposa · velocidad 3-3.5','Coloca la mariposa correctamente. No excedas velocidad 4 ni uses la espátula mientras gira.'],
    vapor:['Agua en vaso · Varoma · velocidad 1','Deja ranuras libres, coloca tapa Varoma y ábrela alejándola del rostro. El tiempo depende del alimento.'],
    limpiar:['500 ml agua + una gota de jabón · 20-30 segundos · velocidad 5','Coloca tapa y cubilete, mezcla, enjuaga y seca por completo los contactos del vaso.']
  };
  let plan=plans[action],warning='';
  if(food==='caliente')warning='<div class="warn"><b>Alimento caliente:</b> no uses Turbo; mantén velocidad 6 o menor y aumenta gradualmente.</div>';
  if(food==='delicado'&&['picar','triturar'].includes(action))warning='<div class="warn">Para alimento delicado conviene giro inverso y velocidad 1-3; triturarlo puede deshacerlo.</div>';
  if(food==='duro'&&action==='triturar')warning='<div class="warn">Usa porciones pequeñas y pulsos controlados. Detén si la máquina vibra o se desplaza.</div>';
  // Separa velocidad/temp/tiempo del texto para mostrarlo visual
  document.getElementById('tmGuideOut').innerHTML=`
    <div class="tm-result" style="margin-top:12px">
      <div class="tm-result-head">✅ Ajuste recomendado</div>
      <div class="tm-result-settings">${plan[0].split('·').map(s=>`<span class="tm-chip">${s.trim()}</span>`).join('')}</div>
      <div class="tm-result-tip">💡 ${plan[1]}</div>
    </div>${warning}`;
}

// Genera un identificador estable a partir de tipo+nombre (sin acentos ni símbolos).
function recipeSlug(r){
  return (String(r.type||'')+'-'+String(r.name||'')).toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60);
}
// Asigna id estable y añade campos NUEVOS opcionales (vacíos) sin tocar las definiciones existentes.
(function assignRecipeIds(){
  let seen={};
  baseRecipes.forEach(r=>{
    let id=recipeSlug(r)||'receta';
    if(seen[id]){seen[id]++;id=id+'-'+seen[id];}else{seen[id]=1;}
    r.id=id;
    if(r.porciones==null)r.porciones='';
    if(r.carbs==null)r.carbs=null;
    if(r.grasas==null)r.grasas=null;
    if(r.dificultad==null)r.dificultad='';
    if(r.conservar==null)r.conservar='';
    if(r.duracion==null)r.duracion='';
    if(r.recalentar==null)r.recalentar='';
    if(r.llevarTrabajo==null)r.llevarTrabajo='';
  });
})();
function recipeIdOf(index){let r=baseRecipes[index];return r?r.id:null;}
function isRecipeFav(index){let id=recipeIdOf(index);return id!=null&&Array.isArray(state.recipeFavorites)&&state.recipeFavorites.includes(id);}
// Migra favoritos guardados por POSICIÓN (formato viejo) a id estable. No destructivo.
(function migrateRecipeFavorites(){
  let f=state.recipeFavorites;if(!Array.isArray(f)||!f.length)return;
  if(!f.some(x=>typeof x==='number'))return; // ya están en formato id
  state.recipeFavorites=f.map(x=>typeof x==='number'?recipeIdOf(x):x).filter(Boolean);
  try{safeStorage.set('pp_full',JSON.stringify(state));}catch(e){}
})();

}
function recipeQuickMode(mode){

  window._portableFormat='todas';

  if(filter)filter.value='todas';

function builderIngredient(text){
  let foodIndex=findFoodIndex(text);if(foodIndex<0)return null;
  let f=foods[foodIndex],m=getFoodMeasure(foodIndex),amount=parseIngredientAmount(text,foodIndex),factor=amount/m.base;
  return{name:f[0],text,foodIndex,amount,unit:m.unit,k:f[1]*factor,p:f[2]*factor,g:f[3]*factor,c:f[4]*factor,cost:f[5]*factor};
}
function buildPortableMeal(){
  let texts=['builderBase','builderProtein','builderExtra','builderExtra2'].map(id=>(document.getElementById(id)||{}).value).filter(Boolean);
  let rows=texts.map(builderIngredient).filter(Boolean);
  let total=rows.reduce((a,x)=>(a.k+=x.k,a.p+=x.p,a.g+=x.g,a.c+=x.c,a.cost+=x.cost,a),{k:0,p:0,g:0,c:0,cost:0});
  let out=document.getElementById('portableBuilderOut');if(!out)return;
  out.innerHTML=`<div class="card"><div class="calc-dashboard">
    <div class="calc-stat"><b>${Math.round(total.k)}</b><span>CALORÍAS</span></div><div class="calc-stat"><b>${total.p.toFixed(1)}g</b><span>PROTEÍNA</span></div>
    <div class="calc-stat"><b>${total.c.toFixed(1)}g</b><span>CARBS</span></div><div class="calc-stat"><b>${total.g.toFixed(1)}g</b><span>GRASA</span></div><div class="calc-stat"><b>${money(total.cost)}</b><span>COSTO</span></div>
  </div>${rows.map(x=>`<div class="item">${getFoodIcon(x.name)} <b>${safeText(x.text)}</b> · ${Math.round(x.k)} kcal · P ${x.p.toFixed(1)}g</div>`).join('')}
  <div class="ok" style="margin-top:8px"><b>Preparación:</b> coloca la proteína y extras sobre la base, cierra firmemente y divide en dos mitades. Mantén frío si contiene carne, huevo o lácteos.</div></div>`;
}
function generateWeightGainDay(){
  let out=document.getElementById('weightGainDay');if(!out)return;
  let appetite=document.getElementById('gainAppetite')?.value||'low';
  let maxBudget=+document.getElementById('gainBudget')?.value||20;
  let dayIndex=new Date().getDay();
  let pick=(type,offset=0)=>{
    let list=baseRecipes.filter(r=>r.type===type&&r.time<=35&&r.cost<=5);
    return list.length?list[(dayIndex+offset)%list.length]:null;
  };
  let selected=[pick('desayuno'),pick('comida',2),pick('cena',4),pick('licuado',1)].filter(Boolean);
  let total=selected.reduce((sum,r)=>sum+r.k,0);
  let protein=selected.reduce((sum,r)=>sum+r.p,0);
  let cost=selected.reduce((sum,r)=>sum+r.cost,0);
  let extras=[];
  if(total<2800){extras.push({name:'Pan con crema de cacahuate y plátano',k:480,p:14,cost:1.35,time:3});total+=480;protein+=14;cost+=1.35}
  if(total<3100&&appetite==='normal'){extras.push({name:'Leche entera con avena y miel',k:420,p:15,cost:1.10,time:3});total+=420;protein+=15;cost+=1.10}
  let budgetOk=cost<=maxBudget;
  out.innerHTML=`<div class="${budgetOk?'ok':'warn'}" style="margin-top:12px"><b>${Math.round(total)} kcal · ${Math.round(protein)}g proteína · ${money(cost)}</b><br>${budgetOk?'Dentro de tu presupuesto.':'Supera el presupuesto; cambia carne por huevo, pollo o frijoles.'}</div>`+
    selected.map((r,i)=>`<div class="item"><b>${['Desayuno','Comida','Cena','Licuado'][i]}: ${r.name}</b><div class="muted">${r.k} kcal · P ${r.p}g · ${money(r.cost)} · ${r.time} min</div></div>`).join('')+
    extras.map(r=>`<div class="item"><b>Entre comidas: ${r.name}</b><div class="muted">${r.k} kcal · P ${r.p}g · ${money(r.cost)} · ${r.time} min</div></div>`).join('')+
    `<div class="ok" style="margin-top:8px"><b>Si comes poco:</b> divide la comida en dos partes y toma el licuado al terminar el trabajo.</div>`;
}

function generateGardenerMeals(){
  let minutes=+(document.getElementById('workEatTime')||{}).value||5,minK=+(document.getElementById('workMinKcal')||{}).value||450;
  let storage=(document.getElementById('workStorage')||{}).value||'cold',fullness=(document.getElementById('workFullness')||{}).value||'light';
  let maxK=fullness==='light'?Math.max(900,minK+250):fullness==='medium'?1100:1500;
  let timeLimit=Math.max(15,minutes*3);
  function storageOk(r){
    if(storage==='hot')return r.tags.includes('termo');
    if(storage==='cold')return r.tags.includes('hielera')||r.type==='licuado'||r.tags.includes('frío')||r.tags.includes('frio');
    if(storage==='shelf')return r.type==='snack'&&!/pollo|huevo|atún|atun|pavo|jamón|jamon|queso|crema|yogurt|leche/i.test(r.ingredients);
    return true;
  }
  let pool=baseRecipes.filter(r=>r.tags.includes('portable')&&storageOk(r)&&r.time<=timeLimit);
  let list=pool.filter(r=>r.k>=minK&&r.k<=maxK);
  let note='';
  if(!list.length&&fullness==='light'){
    let mains=pool.filter(r=>r.k>=Math.max(350,minK-250)&&r.k<=maxK).sort((a,b)=>Math.abs(minK-a.k)-Math.abs(minK-b.k)).slice(0,5);
    let snacks=baseRecipes.filter(r=>(r.type==='snack'||r.type==='fruta'||r.type==='licuado')&&storageOk(r)&&r.time<=10).sort((a,b)=>b.k-a.k);
    list=mains.map((r,i)=>{
      let s=snacks.find(x=>x.name!==r.name&&r.k+x.k>=minK) || snacks[i%Math.max(1,snacks.length)];
      return s?{...r,combo:s,comboK:r.k+s.k,comboP:r.p+s.p,comboCost:r.cost+s.cost}:r;
    });
    note='No encontré una sola comida ligera de '+minK+' kcal. Te armé combos ligeros: comida + snack para llegar a la meta sin llenarte de golpe.';
  }
  if(!list.length){
    list=pool.sort((a,b)=>Math.abs(minK-a.k)-Math.abs(minK-b.k)).slice(0,8);
    note='No hubo coincidencia exacta. Te muestro las opciones más cercanas para ese tiempo y forma de llevarla.';
  }
  list=list.slice(0,8);

// LISTA EXACTA DE COMPRA: usa el catálogo foods (con precios) para saber qué comprar y si alcanza el presupuesto
function exactShoppingList(recipes){
  let agg={},unmatched={};
  (recipes||[]).forEach(r=>{
    if(!r)return;
    (r.ingredients||'').split(',').map(x=>x.trim()).filter(Boolean).forEach(text=>{
      let it=builderIngredient(text);
      if(it&&it.cost>0){
        let k=it.name;
        if(!agg[k])agg[k]={name:it.name,unit:it.unit,amount:0,cost:0};
        agg[k].amount+=it.amount;agg[k].cost+=it.cost;
      }else{
        let nm=(shoppingName(text)||text).trim();
        if(nm)unmatched[nm]=(unmatched[nm]||0)+1;
      }
    });
  });
  let items=Object.values(agg).sort((a,b)=>b.cost-a.cost);
  let total=items.reduce((a,x)=>a+x.cost,0);
  return {items,unmatched,total};
}
function shopCleanName(name){
  return String(name).replace(/\s*(1\/2 taza|1 taza|1\/2|100g|28g|taza|cda|lata|mediana|mediano|cocido|cocida)\b/gi,'').replace(/\s+/g,' ').trim()||String(name);
}
function shopQty(x){
  let a=Math.round(x.amount*10)/10,u=x.unit;
  if(u==='g')return (Math.round(x.amount))+' g';
  if(u==='pieza')return (Math.round(x.amount))+(Math.round(x.amount)===1?' pieza':' piezas');
  if(u==='lata')return (Math.round(x.amount))+(Math.round(x.amount)===1?' lata':' latas');
  return a+' '+u;
}

function recipePoolForWeekly(store,time,budget){

// Núcleo compartido: construye el menú y guarda las "bolsas" de recetas para poder cambiar cada comida
function weeklyBuildCore(store,time,daysCount,budget,goalK,targetId,cookDay){
  daysCount=Math.min(Math.max(+daysCount||5,2),7);
  let pool=recipePoolForWeekly(store,time,budget);
  let breakfasts=pool.filter(r=>r.type==='desayuno'||r.type==='licuado');
  let meals=pool.filter(r=>r.type==='comida'||r.type==='cena');
  let snacks=pool.filter(r=>r.type==='snack'||r.type==='licuado');
  if(breakfasts.length<2)breakfasts=baseRecipes.filter(r=>r.type==='desayuno'||r.type==='licuado').slice(0,10);
  if(meals.length<2)meals=baseRecipes.filter(r=>r.type==='comida'||r.type==='cena'||r.tags.includes('portable')).slice(0,16);
  if(snacks.length<2)snacks=baseRecipes.filter(r=>r.type==='snack'||r.type==='licuado').slice(0,10);
  cookDay=cookDay||((store==='costco'||time==='batch')?'Domingo':'Hoy en la noche');
  let names=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'].slice(0,daysCount);
  state.weeklyMenu=names.map((day,i)=>{
    let chosen=[breakfasts[i%breakfasts.length],meals[(i*2)%meals.length],meals[(i*2+1)%meals.length],snacks[i%snacks.length]].filter(Boolean);
    let k=chosen.reduce((a,r)=>a+r.k,0);
    if(k<goalK)chosen.push(weeklyExtraForBudget(budget));
    return{day,store,time,cookDay,meals:chosen,k:chosen.reduce((a,r)=>a+r.k,0),p:chosen.reduce((a,r)=>a+r.p,0),cost:chosen.reduce((a,r)=>a+r.cost,0)};
  });
  window._weeklyPools={breakfasts,meals,snacks};
  window._weeklyBudget=budget;window._weeklyTarget=targetId;
  save();renderWeeklyInto(targetId,budget);
  let el=document.getElementById(targetId);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// Cambiar UNA comida sin rehacer toda la semana
function swapWeeklyMeal(di,mi){
  let d=(state.weeklyMenu||[])[di];if(!d||!d.meals[mi])return;
  let pools=window._weeklyPools||{},cur=d.meals[mi];
  let pool=mi===0?(pools.breakfasts||[]):mi>=3?(pools.snacks||[]):(pools.meals||[]);
  if(pool.length<2){
    let t=cur.type;
    pool=(t==='desayuno'||t==='licuado')?baseRecipes.filter(r=>r.type==='desayuno'||r.type==='licuado'):(t==='snack')?baseRecipes.filter(r=>r.type==='snack'||r.type==='licuado'):baseRecipes.filter(r=>r.type==='comida'||r.type==='cena'||r.tags.includes('portable'));
  }
  if(pool.length<2)return;
  let idx=pool.findIndex(r=>r.name===cur.name);
  let next=idx<0?pool[Math.floor(Math.random()*pool.length)]:pool[(idx+1)%pool.length];
  if(next&&next.name===cur.name&&pool.length>1)next=pool[(pool.indexOf(next)+1)%pool.length];
  if(!next)return;
  d.meals[mi]=next;
  d.k=d.meals.reduce((a,r)=>a+r.k,0);d.p=d.meals.reduce((a,r)=>a+r.p,0);d.cost=d.meals.reduce((a,r)=>a+(r.cost||0),0);
  save();renderWeeklyInto(window._weeklyTarget||'smartWeeklyOut',window._weeklyBudget||100);
}

function buildTabIfNeeded(i,force=false){
  let el=document.getElementById('tab_'+i); if(!el)return false;
  if(!force&&el.dataset.built==='1')return false;
  el.innerHTML=section(tabs[i]); el.dataset.built='1'; return true;
}
function render(){
  let app=$('#app');
  app.innerHTML=tabs.map((t,i)=>`<section id="tab_${i}" class="tab ${i==0?'active':''}" data-built="0"><div class="card"><div class="skeleton-line"></div></div></section>`).join('');
  buildTabIfNeeded(0,true);
  initNav();
  buildTabIfNeeded(_activeTab||0);
  bindAll();
}

function initQuickRailDrag(){
  var rail=document.getElementById('quickRail');
  var toggle=rail&&rail.querySelector('.quick-toggle');
  if(!rail||!toggle||toggle._dragInit)return; toggle._dragInit=true;
  var dragging=false,moved=false,sx=0,sy=0,ol=0,ot=0;
  function down(e){
    var p=e.touches?e.touches[0]:e;
    dragging=true;moved=false;sx=p.clientX;sy=p.clientY;
    var r=rail.getBoundingClientRect();ol=r.left;ot=r.top;
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
    document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
  }
  function move(e){
    if(!dragging)return;
    var p=e.touches?e.touches[0]:e;
    var dx=p.clientX-sx,dy=p.clientY-sy;
    if(!moved&&(Math.abs(dx)>6||Math.abs(dy)>6)){moved=true;if(rail.classList.contains('open'))toggleQuickRail(false);}
    if(!moved)return;
    if(e.cancelable)e.preventDefault();
    var nl=Math.max(4,Math.min(window.innerWidth-rail.offsetWidth-4,ol+dx));
    var nt=Math.max(4,Math.min(window.innerHeight-rail.offsetHeight-4,ot+dy));
    rail.style.left=nl+'px';rail.style.top=nt+'px';rail.style.right='auto';rail.style.bottom='auto';rail.style.transform='none';
  }
  function up(){
    document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);
    document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);
    if(moved){
      state.quickRailPos={left:parseInt(rail.style.left)||0,top:parseInt(rail.style.top)||0};save();
      var block=function(ev){ev.stopPropagation();ev.preventDefault();};
      toggle.addEventListener('click',block,true);
      setTimeout(function(){toggle.removeEventListener('click',block,true);},60);
    }
    dragging=false;
  }
  toggle.addEventListener('mousedown',down);
  toggle.addEventListener('touchstart',down,{passive:true});
}

function gastoHeroChips(){

function renderCasaTasks(){
  let today=new Date().toISOString().slice(0,10);
  if(!state.taskLog) state.taskLog={};
  if(!state.taskLog[today]) state.taskLog[today]=[];
  let done=state.taskLog[today];

  ['Diarias','Semanales','Mensuales'].forEach(cat=>{
    let el=document.getElementById('task'+cat); if(!el) return;
    let tasks=CASA_TASKS[cat.toLowerCase()];
    el.innerHTML=tasks.map(t=>{
      let isDone=done.includes(t);
      return `<label style="display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid #f0f4f1;cursor:pointer;${isDone?'opacity:.5;text-decoration:line-through':''}">

        <span style="font-size:14px">${t}</span>
      </label>`;
    }).join('');
  });

  // Progress summary
  let total=Object.values(CASA_TASKS).flat().length;
  let pct=Math.round(done.length/total*100);
  let summary=document.getElementById('casaProgress');
  if(summary) summary.innerHTML=`<div style="margin-bottom:10px">

function toggleCasaTask(task, checked){
  let today=new Date().toISOString().slice(0,10);
  if(!state.taskLog) state.taskLog={};
  if(!state.taskLog[today]) state.taskLog[today]=[];
  if(checked){if(!state.taskLog[today].includes(task))state.taskLog[today].push(task);}
  else{state.taskLog[today]=state.taskLog[today].filter(t=>t!==task);}
  save(); renderCasaTasks(); renderSemanaChart();
}

function clearDoneTasks(){
  let today=new Date().toISOString().slice(0,10);
  if(state.taskLog&&state.taskLog[today]) state.taskLog[today]=[];
  save(); renderCasaTasks();
}

function handleSSdrop(e){
  e.preventDefault();
  let f=e.dataTransfer.files[0]; if(!f||!f.type.startsWith('image/'))return;
  let inp=document.getElementById('ssInput');
  let dt=new DataTransfer(); dt.items.add(f); inp.files=dt.files;
  analyzeScreenshot(inp);
}

function analyzeScreenshot(input){
  let f=input.files[0]; if(!f)return;
  let reader=new FileReader();
  reader.onload=e=>{
    let img=document.getElementById('ssPreview');
    let wrap=document.getElementById('ssPreviewWrap');
    let zone=document.getElementById('ssDropZone');
    if(img) img.src=e.target.result;
    if(wrap) wrap.style.display='block';
    if(zone) zone.style.display='none';
    // Analyze with Claude API
    analyzeWithClaude(e.target.result);
  };
  reader.readAsDataURL(f);
}

function clearSS(){
  let wrap=document.getElementById('ssPreviewWrap');
  let zone=document.getElementById('ssDropZone');
  let out=document.getElementById('ssOut');
  let inp=document.getElementById('ssInput');
  if(wrap) wrap.style.display='none';
  if(zone) zone.style.display='block';
  if(out) out.innerHTML='';
  if(inp) inp.value='';
}

function analyzeWithClaude(imageDataUrl){
  if(!state.screenshots) state.screenshots=[];
  let id=Date.now();
  state.screenshots.push({date:new Date().toISOString().slice(0,10),img:imageDataUrl,id});
  save();
  let out=document.getElementById('ssOut'); if(!out) return;
  out.innerHTML='<div class="card" style="margin-top:12px"><h3 style="margin-top:0">📸 Screenshot guardado ✅</h3><div class="ok" style="font-size:14px;margin-bottom:10px">Guardado en tu app. Elige qué quieres analizar:</div><div class="grid" style="gap:8px">'+['¿Ella tiene interés?|interes','¿Cómo respondo esto?|responder','¿Señales de alerta?|alerta','¿La conversación va bien?|estado','¿Cómo propongo la cita?|cita'].map(x=>{let[l,t]=x.split('|');return'<button class="btn" style="padding:12px;font-weight:800;font-size:14px" onclick="analizarSS(\''+t+'\')">'+l+'</button>';}).join('')+'</div><div id="ssAnalysisOut" style="margin-top:10px"></div><h3 style="margin-top:14px">📁 Guardados ('+state.screenshots.length+')</h3><div id="ssList"></div></div>';
  renderSsList();
}
function analizarSS(tipo){
  let out=document.getElementById('ssAnalysisOut'); if(!out) return;
  const R={
    interes:['🟢 Señales de interés: responde en menos de 1 hr, hace preguntas, manda audios, inicia conversación sin excusa. 3+ señales = interés real.','💡 El interés real se mide en acciones: ¿Ella inicia conversación? ¿Propone algo? Eso vale más que mensajes bonitos.','📊 Si responde con más de 5 palabras y hace preguntas = interés. Si responde sin preguntar = interés pasivo. "Ok" solo = señal baja.'],
    responder:['✍️ Regla: igual o más corto que su mensaje. 3 palabras de ella = 3-5 tuyas. No escribas párrafos si ella escribe una línea.','🎯 Toma lo último que dijo, comenta algo gracioso o curioso, luego pregunta algo simple. Eso sostiene cualquier conversación.','💬 No respondas de inmediato si ella tardó — iguala el ritmo. Eso calibra la energía.'],
    alerta:['🚩 Señales reales: responde solo cuando le conviene, nunca inicia, siempre ocupada, cancela sin reagendar, respuestas de 1 palabra por semanas.','⚠️ "Eres muy buena persona" = friendzone próxima. "No busco nada serio" = no contigo específicamente.','✅ Que tarde pero escriba largo = buena señal. Prefiere llamada = muy buena señal. No siempre lo obvio es lo real.'],
    estado:['📈 Va bien: hay intercambio personal, ella comparte sin que preguntes, hay humor compartido, la conversación avanza en profundidad.','📊 Equilibrio sano: ninguno espera siempre al otro. Si siempre inicias tú o siempre ella, algo está roto.','💡 Va bien cuando ninguno quiere que termine. Señal simple pero real.'],
    cita:['🎯 No preguntes "¿quieres salir algún día?" — propón algo específico. "El sábado hay [algo] en Maui — ¿vienes?" es infinitamente mejor.','📍 En Maui tienes ventaja: propón sunset en Makena, café en Paia, playa secreta, mercado local. Experiencias, no "café genérico".','⏰ Momento ideal: después de 3-5 intercambios divertidos seguidos. Si llevas 2 semanas sin proponer, ya te clasificó.'],
  };
  let pool=R[tipo]||R.interes;
  let r=pool[Math.floor(Math.random()*pool.length)];
  out.innerHTML='<div style="background:#f0fff4;border-radius:14px;padding:14px;font-size:14px;line-height:1.7">'+r+'<div style="margin-top:8px"><button class="btn" onclick="analizarSS(\''+tipo+'\')" style="padding:6px 12px;font-size:12px">🔄 Otro análisis</button></div></div>';
}
function renderSsList(){
  let el=document.getElementById('ssList'); if(!el) return;
  if(!state.screenshots||!state.screenshots.length){el.innerHTML='<div class="muted" style="font-size:13px">Sin screenshots guardados aún.</div>';return;}
  el.innerHTML=state.screenshots.slice().reverse().slice(0,8).map(s=>'<div style="display:flex;align-items:center;gap:10px;margin:6px 0;padding:8px;border:1px solid var(--b);border-radius:12px;background:#fff"><img src="'+s.img+'" style="width:60px;height:60px;object-fit:cover;border-radius:8px;cursor:pointer" onclick="viewFullSS('+s.id+')"><div style="flex:1"><div style="font-size:13px;font-weight:800">'+s.date+'</div><div class="muted" style="font-size:12px">Toca para ver completo</div></div><button onclick="deleteSS('+s.id+')" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:18px">🗑️</button></div>').join('');
}
function viewFullSS(id){
  let s=state.screenshots?.find(x=>x.id===id); if(!s) return;
  let w=window.open('','_blank');
  w.document.write('<html><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="'+s.img+'" style="max-width:100%;max-height:100vh"><\/body><\/html>');
}
function deleteSS(id){
  if(!confirm('¿Borrar este screenshot?'))return;
  state.screenshots=state.screenshots.filter(x=>x.id!==id);
  save(); renderSsList();
}

function skinRedFlags(){
  return ['skinRapid','skinBleed','skinFever','skinEye','skinSwelling','skinScar'].filter(id=>document.getElementById(id)?.checked);
}

async function resizeSkinImage(file){
  return new Promise((resolve,reject)=>{
    let reader=new FileReader();
    reader.onerror=()=>reject(reader.error);
    reader.onload=()=>{
      let img=new Image();
      img.onerror=()=>reject(Error('No se pudo leer la foto'));
      img.onload=()=>{
        let max=1000, scale=Math.min(1,max/Math.max(img.width,img.height));
        let canvas=document.createElement('canvas');
        canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',.72));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function previewSkinPhoto(input){
  let file=input.files?.[0], out=document.getElementById('skinPhotoPreview');
  if(!file||!out)return;
  if(file.size>15*1024*1024){input.value='';return alert('La foto es demasiado grande. Usa una menor de 15 MB.')}
  try{
    state.skin.draftPhoto=await resizeSkinImage(file);
    out.style.display='block';
    out.innerHTML=`<img src="${state.skin.draftPhoto}" alt="Foto para seguimiento de piel" style="width:min(280px,100%);max-height:340px;object-fit:contain;border-radius:12px"><p class="muted">Foto preparada. La evaluación se basa también en tus respuestas, no solamente en esta imagen.</p>`;
  }catch(e){alert(e.message)}
}

function startSkinAssessment(){
  let flags=skinRedFlags();
  let draft={
    id:Date.now(),date:document.getElementById('skinDate').value,
    area:document.getElementById('skinArea').value,
    concern:document.getElementById('skinConcern').value,
    duration:document.getElementById('skinDuration').value,
    discomfort:document.getElementById('skinDiscomfort').value,
    skinType:document.getElementById('skinType').value,
    exposure:document.getElementById('skinExposure').value,
    products:document.getElementById('skinProducts').value.trim(),
    allergies:document.getElementById('skinAllergies').value.trim(),
    notes:document.getElementById('skinNotes').value.trim(),
    flags,photo:state.skin.draftPhoto||'',answers:[],step:0
  };
  state.skin.current=draft;
  state.skin.profile={products:draft.products,allergies:draft.allergies};
  save();
  if(flags.includes('skinSwelling')){
    finishSkinAssessment(true,'Hinchazón facial/labial o dificultad para respirar puede ser una emergencia. Busca atención de emergencia ahora; no esperes una respuesta de la app.');
    return;
  }
  askNextSkinQuestion();
}

function skinQuestionList(d){
  let list=[
    {id:'count',q:'¿Cuántas lesiones activas ves aproximadamente?',options:['1–5','6–15','Más de 15','No aplica/no sé']},
    {id:'sweat',q:'¿Empeora después de sudar, usar sombrero, casco o tocarte con guantes?',options:['Sí','No','No estoy seguro']},
    {id:'routine',q:'¿Lavas la zona después del trabajo y usas protector solar?',options:['Ambas cosas','Solo lavo','Solo protector','Ninguna']},
    {id:'reaction',q:'¿Algún producto nuevo causó ardor, comezón o empeoramiento?',options:['Sí','No','No estoy seguro']},
    {id:'goal',q:'¿Qué quieres priorizar?',options:['Menos brotes','Menos irritación','Menos manchas','Revisar una lesión','Rutina simple']}
  ];
  if(d.concern==='lesion')list.unshift({id:'change',q:'¿La lesión cambió en tamaño, forma o color, o tiene bordes irregulares?',options:['Sí','No','No estoy seguro']});
  if(d.discomfort==='deep')list.unshift({id:'scarring',q:'¿Esos bultos dejan marcas o cicatrices?',options:['Sí','No','Apenas comenzaron']});
  return list;
}

function askNextSkinQuestion(){
  let d=state.skin.current, out=document.getElementById('skinAssistant');
  if(!d||!out)return;
  let questions=skinQuestionList(d), question=questions[d.step];
  if(!question){finishSkinAssessment(false);return}
  out.innerHTML=`<div class="card"><div class="pill">Pregunta ${d.step+1} de ${questions.length}</div><h3>${safeText(question.q)}</h3><div class="grid">${question.options.map(option=>`<button class="btn" onclick="answerSkinQuestion('${question.id}','${option.replace(/'/g,"\\'")}')">${safeText(option)}</button>`).join('')}</div><label>Detalle opcional</label><input id="skinAnswerDetail" placeholder="Agrega algo que consideres importante"></div>`;
}

function answerSkinQuestion(id,value){
  let d=state.skin.current;if(!d)return;
  d.answers.push({id,value,detail:(document.getElementById('skinAnswerDetail')?.value||'').trim()});
  d.step++; save(); askNextSkinQuestion();
}

function skinAnswer(d,id){
  return d.answers.find(x=>x.id===id)?.value||'';
}

function finishSkinAssessment(urgent=false,urgentMessage=''){
  let d=state.skin.current;if(!d)return;
  let concern=d.concern, deep=d.discomfort==='deep'||skinAnswer(d,'scarring')==='Sí';
  let changed=skinAnswer(d,'change')==='Sí'||d.flags.includes('skinRapid')||d.flags.includes('skinBleed');
  let infection=d.flags.includes('skinFever')||d.flags.includes('skinEye');
  let reaction=skinAnswer(d,'reaction')==='Sí';
  let level=urgent||infection?'Urgente':changed||deep?'Consulta recomendada':'Autocuidado prudente';
  let observations=[];
  if(reaction)observations.push('Suspende el producto nuevo que irritó y vuelve temporalmente a limpiador, hidratante y protector suaves.');
  if(deep)observations.push('Las lesiones profundas o con cicatriz suelen necesitar evaluación dermatológica; evita exprimirlas.');
  if(changed)observations.push('Una lesión que cambia, sangra o no cicatriza necesita revisión presencial.');
  if(infection)observations.push('Fiebre, pus extendido, calor intenso o afectación del ojo requieren atención médica pronta.');
  if(concern==='breakouts'&&!deep&&!reaction)observations.push('Si parecen brotes leves, introduce solamente un activo a la vez, en poca frecuencia, y observa irritación durante varias semanas.');
  if(concern==='dryness'||concern==='itch'||reaction)observations.push('Prioriza productos sin fragancia y evita exfoliantes, tónicos con alcohol y agua muy caliente.');
  if(concern==='spots')observations.push('La protección solar constante ayuda a evitar que las marcas se oscurezcan; no talles ni exprimas.');
  observations.push('Por trabajar al exterior: limpiador suave después del turno, hidratante según necesidad y protector amplio espectro resistente al agua SPF 30+.');
  let options=[];
  if(concern==='breakouts'&&!deep&&!reaction)options.push('Opciones sin receta que puedes discutir con un farmacéutico: ácido salicílico, lavado con peróxido de benzoilo o adapaleno. No empieces los tres juntos.');
  options.push('Haz una prueba en una zona pequeña y suspende si aparece hinchazón, ampollas o irritación intensa.');
  d.result={level,observations,options,urgentMessage,createdAt:new Date().toISOString()};
  state.skin.sessions.unshift(d);
  state.skin.sessions=state.skin.sessions.slice(0,30);
  state.skin.current=null; state.skin.draftPhoto='';
  save(); renderSkinAssessmentResult(d); renderSkinHistory();
}

function renderSkinAssessmentResult(d){
  let out=document.getElementById('skinAssistant');if(!out||!d?.result)return;
  let cls=d.result.level==='Urgente'?'warn':d.result.level==='Consulta recomendada'?'warn':'ok';
  out.innerHTML=`<div class="card"><div class="${cls}"><b>${safeText(d.result.level)}</b>${d.result.urgentMessage?`<p>${safeText(d.result.urgentMessage)}</p>`:''}</div>
    <h3>Lo que orientan tus respuestas</h3><ul>${d.result.observations.map(x=>`<li>${safeText(x)}</li>`).join('')}</ul>
    <h3>Próximos pasos</h3><ul>${d.result.options.map(x=>`<li>${safeText(x)}</li>`).join('')}</ul>
    <p class="muted">La app no identificó una enfermedad ni evaluó lunares con precisión médica. Guarda otra foto con la misma luz para comparar evolución.</p></div>`;
}

function renderSkinHistory(){
  let out=document.getElementById('skinHistory');if(!out)return;
  let sessions=state.skin.sessions||[];
  out.innerHTML=sessions.length?`<div class="grid">${sessions.map(s=>`<div class="card" style="margin:0">${s.photo?`<img src="${s.photo}" alt="Seguimiento de piel" style="width:100%;height:190px;object-fit:cover;border-radius:10px">`:''}<b>${safeText(s.date)} · ${safeText(s.area)}</b><p>${safeText(s.result?.level||'Evaluación')}</p><p class="muted">${safeText(s.notes||'Sin nota')}</p><button class="btn" onclick="viewSkinSession(${s.id})">Ver</button><button class="btn icon-btn" onclick="deleteSkinSession(${s.id})">🗑</button></div>`).join('')}</div>`:'<div class="mini">Todavía no hay evaluaciones guardadas.</div>';
}

function askSkinAssistant(){
  let input=document.getElementById('skinFollowup'), question=(input?.value||'').trim();
  if(!question)return;
  let q=question.toLowerCase(), answer='';
  if(/hinch|respirar|labio|ojo|fiebre/.test(q))answer='Esos síntomas pueden requerir atención médica urgente. Si hay dificultad para respirar, hinchazón facial o afectación de la visión, busca atención de emergencia ahora.';
  else if(/sang|lunar|cambia|no cicatriza/.test(q))answer='Una lesión que cambia, sangra o no cicatriza debe revisarla presencialmente un profesional. No intentes tratarla como acné.';
  else if(/arde|irrita|comez|reacci/.test(q))answer='Suspende el producto nuevo, enjuaga suavemente y usa temporalmente solo limpiador, hidratante y protector sin fragancia. Si la reacción es intensa o empeora, consulta.';
  else if(/producto|comprar|usar|tratamiento/.test(q))answer='No puedo elegir un tratamiento exacto solamente por una foto. Para brotes leves puede hablarse con un farmacéutico sobre ácido salicílico, peróxido de benzoilo o adapaleno; comienza solo uno y revisa la etiqueta.';
  else if(/sol|protector|spf|sudor/.test(q))answer='Para trabajo exterior usa protector amplio espectro, resistente al agua, SPF 30 o mayor. Reaplica según la etiqueta y después de sudar mucho; añade sombrero, sombra y ropa UPF.';
  else if(/cuánto|cuando|mejora|tiempo/.test(q))answer='Los cambios de la piel suelen necesitar varias semanas. Guarda fotos comparables y no cambies productos cada pocos días. Si empeora, duele o deja cicatriz, consulta antes.';
  else answer='Puedo orientar mejor si indicas zona, duración, dolor o comezón, cambios, productos usados y si está dejando cicatriz. No puedo confirmar una enfermedad únicamente con la fotografía.';
  state.skin.messages.unshift({id:Date.now(),question,answer,date:new Date().toISOString()});
  state.skin.messages=state.skin.messages.slice(0,20);
  input.value='';save();renderSkinChat();
}

function renderSkinChat(){
  let out=document.getElementById('skinChatHistory');if(!out)return;
  out.innerHTML=(state.skin.messages||[]).slice(0,8).map(x=>`<div class="item"><b>Tú:</b> ${safeText(x.question)}<br><b>Asistente:</b> ${safeText(x.answer)}</div>`).join('');
}

function viewSkinSession(id){
  let session=state.skin.sessions.find(x=>x.id===id);if(session)renderSkinAssessmentResult(session);
}

function deleteSkinSession(id){
  if(!confirm('¿Eliminar esta evaluación y su foto?'))return;
  state.skin.sessions=state.skin.sessions.filter(x=>x.id!==id);save();renderSkinHistory();
}

function safeText(value){
  return String(value||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function handleDatingPhotoFiles(files){
  files=[...(files||[])].filter(f=>/^image\//.test(f.type));
  if(!files.length){alert('Sube una imagen');return}
  state.dating.profilePhotos=state.dating.profilePhotos||[];
  let pending=files.length;
  files.slice(0,8).forEach(file=>{
    let reader=new FileReader();
    reader.onload=function(){
      let img=new Image();
      img.onload=function(){
        let stats=estimatePhotoStats(img);
        state.dating.profilePhotos.unshift({id:Date.now()+Math.random(),name:file.name,date:new Date().toLocaleDateString('es-US'),src:reader.result,w:img.width,h:img.height,stats:stats,tags:[]});
        state.dating.profilePhotos=state.dating.profilePhotos.slice(0,12);
        if(--pending<=0){save();renderDatingPhotoPreview();analyzeDatingPhotoSet()}
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}
function estimatePhotoStats(img){
  let canvas=document.createElement('canvas'),max=140;
  let scale=Math.min(1,max/img.width,max/img.height);
  canvas.width=Math.max(1,Math.round(img.width*scale));canvas.height=Math.max(1,Math.round(img.height*scale));
  let ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,canvas.width,canvas.height);
  let data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  let sum=0,contrast=0,last=0,edge=0,n=data.length/4;
  for(let i=0;i<data.length;i+=4){let y=.2126*data[i]+.7152*data[i+1]+.0722*data[i+2];sum+=y;contrast+=Math.abs(y-128);edge+=Math.abs(y-last);last=y}
  let bright=sum/n;
  let aspect=img.width/img.height;
  return {bright:Math.round(bright),contrast:Math.round(contrast/n),sharp:Math.round(edge/n),aspect:+aspect.toFixed(2)};
}
function photoAdvice(photo){
  let s=photo.stats||{},score=50,good=[],bad=[];
  if(s.bright>=85&&s.bright<=190){score+=18;good.push('buena luz')}else{score-=12;bad.push(s.bright<85?'muy oscura':'demasiado brillante')}
  if((s.sharp||0)>12){score+=14;good.push('se ve clara')}else{score-=10;bad.push('puede estar borrosa')}
  if((s.contrast||0)>34){score+=8;good.push('buen contraste')}else{bad.push('falta contraste')}
  if(s.aspect>.65&&s.aspect<1.35){score+=8;good.push('encuadre útil para perfil')}else if(s.aspect>=1.35){bad.push('foto muy horizontal; quizá se pierda tu cara')}else{good.push('formato vertical útil')}
  if((photo.w||0)>=900&&(photo.h||0)>=900){score+=7;good.push('buena resolución')}else{bad.push('baja resolución')}
  score=Math.max(20,Math.min(95,score));
  let level=score>=78?'Buena para perfil':score>=58?'Sirve, pero mejora':'Mejor repetirla';
  return {score,level,good,bad};
}

function revisarMensaje(){
  let draft=(document.getElementById('ligarDraft')||{}).value?.trim()||'';
  let out=document.getElementById('ligarOut');
  if(!draft){alert('Escribe tu borrador primero');return}
  let issues=[],good=[];
  if(draft.length>260)issues.push('Es largo; intenta dejar una sola idea.');
  if((draft.match(/\?/g)||[]).length>2)issues.push('Tiene demasiadas preguntas y puede sentirse como interrogatorio.');
  if(/[A-ZÁÉÍÓÚÑ]{6,}/.test(draft))issues.push('Evita escribir palabras completas en mayúsculas.');
  if(/contesta|resp[oó]ndeme|por qu[eé] no|insist|aunque digas no|tu novio no|dame una oportunidad/i.test(draft))issues.push('Puede sonar insistente o ignorar un límite.');
  if(/idiota|loca|t[oó]xica|est[uú]pida|fea/i.test(draft))issues.push('Contiene una descalificación; no lo envíes.');
  if(!issues.length)good.push('Es breve, claro y no muestra presión evidente.');
  if(/[?]/.test(draft))good.push('Incluye una pregunta que permite continuar.');
  let improved=draft.replace(/por qu[eé] no me contestas[?]?/ig,'Cuando tengas tiempo me cuentas.')
    .replace(/resp[oó]ndeme/ig,'cuando puedas dime');
  out.innerHTML=`<div class="card"><h3>✅ Revisión antes de enviar</h3>
    ${issues.length?`<div class="warn"><b>Ajusta esto:</b><ul>${issues.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:`<div class="ok">${good.join(' ')}</div>`}
    <p><b>Versión revisada:</b></p><div class="item">${safeText(improved)}</div>
    <button class="btn primary" onclick="copyResponse('${improved.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">Copiar versión</button></div>`;
}

function analyzeFullConversation(){
  let text=(document.getElementById('conversationFull')||{}).value?.trim()||'';
  if(text.length<12){alert('Pega una conversación más completa');return}
  let lower=text.toLowerCase();
  let positive=(lower.match(/jaja|haha|😂|😊|❤️|me gusta|claro|s[ií]|cuando|vamos|quiero|encanta/g)||[]).length;
  let negative=(lower.match(/ocupada|no puedo|no quiero|no me interesa|solo amigos|tengo novio|déjame|dejame|no escribas|bloquear/g)||[]).length;
  let questions=(text.match(/\?/g)||[]).length;
  let boundary=/no me interesa|solo amigos|tengo novio|no escribas|d[eé]jame|no quiero verte|bloque/i.test(lower);
  let oneSided=/\b(ok|sí|si|no|jaja)\b/g.test(lower)&&text.split('\n').filter(Boolean).length>3;
  let score=Math.max(5,Math.min(95,50+positive*7-negative*15+(questions>1?8:0)-(oneSided?10:0)));
  if(boundary)score=Math.min(score,15);
  let level=score>=70?'Interés probable':score>=40?'Interés incierto':'Interés bajo';
  let color=score>=70?'#15704f':score>=40?'#b7791f':'#b42318';
  let goal=(document.getElementById('datingGoal')||{}).value||'conocer';
  let language=(document.getElementById('datingLanguage')||{}).value||'es';
  let next=boundary
    ? (language==='en'?'I understand. Thanks for being clear. Take care.':'Entiendo. Gracias por ser clara. Que estés bien.')
    : score>=70
      ? (language==='en'?'I enjoy talking with you. Would you like to get coffee this week?':'Me gusta hablar contigo. ¿Te gustaría tomar un café esta semana?')
      : score>=40
        ? (language==='en'?'How has your week been? No rush if you are busy.':'¿Cómo va tu semana? Sin prisa si estás ocupada.')
        : (language==='en'?'No worries. I will give you space.':'No hay problema. Te dejo tu espacio.');
  let wait=boundary?'No vuelvas a insistir.':score>=70?'Puedes responder cuando estés disponible.':score>=40?'Espera 24–48 horas; si no responde, no mandes mensajes repetidos.':'No envíes otro mensaje salvo que ella retome la conversación.';
  let reason=boundary?'Expresó un límite claro.':score>=70?'Hay respuestas positivas, preguntas o disposición para continuar.':score>=40?'Hay señales mezcladas; falta reciprocidad consistente.':'Predominan respuestas cerradas, evasivas o poca iniciativa.';
  let analysis={id:Date.now(),date:new Date().toLocaleDateString('es-US'),level,score,reason,next,goal,excerpt:text.slice(0,180)};
  state.dating.history.unshift(analysis);
  state.dating.history=state.dating.history.slice(0,20);
  save();
  let out=document.getElementById('conversationAnalysis');
  out.innerHTML=`<div class="card"><h3>Resultado</h3>
    <div class="grid"><div class="mini"><span class="muted">Nivel</span><div class="kpi" style="color:${color}">${level}</div></div><div class="mini"><span class="muted">Indicador orientativo</span><div class="kpi">${score}/100</div></div></div>
    <p><b>Por qué:</b> ${safeText(reason)}</p>
    <div class="${boundary?'warn':'ok'}"><b>Siguiente mensaje:</b><br>${safeText(next)}<br><button class="btn" onclick="copyResponse('${next.replace(/'/g,"\\'")}')">Copiar</button></div>
    <p><b>Seguimiento:</b> ${safeText(wait)}</p>
    <p class="muted">Este indicador analiza palabras y estructura; no puede conocer con certeza lo que otra persona siente.</p></div>`;
  renderDatingHistory();
}

function datingNormalize(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function datingSentiment(text){
  const raw=String(text||'');
  const lower=datingNormalize(raw);
  const lines=raw.split(/\n+/).map(x=>x.trim()).filter(Boolean);
  const ellaLines=lines.filter(x=>/^(ella|ella:|e:|her:|she:)/i.test(x)||(!/^(yo|me|ruben|tu|tú):/i.test(x)&&lines.length<4));
  const positiveWords=['jaja','haha','😂','😊','❤️','me gusta','claro','si','sí','cuando','vamos','quiero','encanta','suena bien','me late','vale','de una','me parece','cuentame','cuéntame','y tu','y tú','que haces','qué haces'];
  const negativeWords=['ocupada','no puedo','no quiero','no me interesa','solo amigos','tengo novio','tengo pareja','déjame','dejame','no escribas','bloquear','bloqueo','no insistas','no gracias','me incomoda'];
  const boundaryWords=['no me interesa','solo amigos','tengo novio','tengo pareja','no escribas','dejame','déjame','no quiero verte','bloque','no insistas','me incomoda'];
  const positive=positiveWords.reduce((n,w)=>n+(lower.includes(datingNormalize(w))?1:0),0);
  const negative=negativeWords.reduce((n,w)=>n+(lower.includes(datingNormalize(w))?1:0),0);
  const boundary=boundaryWords.some(w=>lower.includes(datingNormalize(w)));
  const questions=(raw.match(/\?/g)||[]).length;
  const laughs=(lower.match(/jaja|haha|jeje|lol/g)||[]).length;
  const shortReplies=(raw.match(/\b(ok|okay|si|sí|no|jaja|aja|mmm)\b/gi)||[]).length;
  const totalLines=Math.max(lines.length,1);
  const ratioShort=shortReplies/totalLines;
  const hasInvite=/cafe|café|salir|vernos|playa|comer|cenar|tomar algo|plan|sábado|sabado|domingo|weekend|this week|coffee/i.test(raw);
  let score=50 + positive*8 + Math.min(questions,4)*4 + laughs*4 - negative*14 - (ratioShort>.45?12:0);
  if(hasInvite&&positive>0)score+=8;
  if(boundary)score=Math.min(score,12);
  score=Math.max(0,Math.min(100,Math.round(score)));
  let level=boundary?'Límite claro':score>=72?'Interés probable':score>=45?'Interés incierto':'Interés bajo';
  let action=boundary?'cerrar':score>=72?(hasInvite?'confirmar':'invitar'):score>=45?'responder':'esperar';
  let risk=boundary?'alto':negative>=2?'medio':score>=45?'bajo':'medio';
  return {score,level,action,risk,boundary,positive,negative,questions,laughs,ratioShort,hasInvite,lines};
}

function generarRespuesta(){
  let msg=(document.getElementById('ligarMsg')||{}).value?.trim();
  if(!msg){alert('Escribe lo que te dijo primero');return;}
  let out=document.getElementById('ligarOut'); if(!out)return;
  let intent=(document.getElementById('ligarIntent')||{}).value||'seguir';
  let tone=(document.getElementById('ligarToneSelect')||{}).value||_ligarTono||'natural';
  let result=datingSentiment(msg);
  let goal=intent==='invitar'?'cita':intent==='cerrar'?'cerrar':'responder';
  let culture=(document.getElementById('ligarCulture')||{}).value||datingCurrentCulture();
  state.dating.culture=culture;
  let replies=datingBestReplies(result,goal,culture==='american'?'en':'es');
  if(tone==='gracioso'&&!result.boundary)replies.unshift('Jaja, esa respuesta necesita explicación.');
  if(tone==='coqueto'&&!result.boundary)replies.unshift('Me dio curiosidad eso de ti 😉 cuéntame más.');
  if(tone==='directo'&&!result.boundary)replies.unshift(intent==='invitar'?'Me caes bien. ¿Café esta semana?':'Prefiero preguntarte directo: ¿te interesa seguir hablando?');
  if(tone==='calma'&&!result.boundary)replies.unshift('Sin prisa. Cuando tengas tiempo me cuentas.');
  replies=[...new Set(replies)].slice(0,4);
  out.innerHTML=`<div class="ligar-result"><h3>💬 Respuestas recomendadas</h3>
    <div class="${result.boundary?'ligar-stop':'ligar-safe'}"><b>Lectura:</b> ${safeText(result.level)} · ${result.score}/100. ${result.boundary?'Responde solo para cerrar con respeto.':'Mantén el mensaje corto y natural.'}</div>
    ${replies.map(r=>`<div class="ligar-copy" ${datingEscapeCopy(r)}><div class="msg">"${safeText(r)}"</div><small>👆 Toca para copiar</small></div>`).join('')}
    <button class="btn" onclick="generarRespuesta()">🔄 Nuevas opciones</button>
  </div>`;
}
function handleDatingPhotoDrop(ev){

function handleDatingPhotoFiles(files){
  files=[...(files||[])].filter(f=>/^image\//.test(f.type));
  if(!files.length){alert('Sube una imagen');return}
  state.dating.profilePhotos=state.dating.profilePhotos||[];
  let pending=files.length;
  files.slice(0,8).forEach(file=>{
    let reader=new FileReader();
    reader.onload=function(){
      let img=new Image();
      img.onload=function(){
        let stats=estimatePhotoStats(img);
        state.dating.profilePhotos.unshift({id:Date.now()+Math.random(),name:file.name,date:new Date().toLocaleDateString('es-US'),src:reader.result,w:img.width,h:img.height,stats:stats,tags:[]});
        state.dating.profilePhotos=state.dating.profilePhotos.slice(0,12);
        if(--pending<=0){save();renderDatingPhotoPreview();analyzeDatingPhotoSet()}
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}
function estimatePhotoStats(img){
  let canvas=document.createElement('canvas'),max=140;
  let scale=Math.min(1,max/img.width,max/img.height);
  canvas.width=Math.max(1,Math.round(img.width*scale));canvas.height=Math.max(1,Math.round(img.height*scale));
  let ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,canvas.width,canvas.height);
  let data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  let sum=0,contrast=0,last=0,edge=0,n=data.length/4;
  for(let i=0;i<data.length;i+=4){let y=.2126*data[i]+.7152*data[i+1]+.0722*data[i+2];sum+=y;contrast+=Math.abs(y-128);edge+=Math.abs(y-last);last=y}
  let bright=sum/n;
  let aspect=img.width/img.height;
  return {bright:Math.round(bright),contrast:Math.round(contrast/n),sharp:Math.round(edge/n),aspect:+aspect.toFixed(2)};
}
function photoAdvice(photo){
  let s=photo.stats||{},score=50,good=[],bad=[];
  if(s.bright>=85&&s.bright<=190){score+=18;good.push('buena luz')}else{score-=12;bad.push(s.bright<85?'muy oscura':'demasiado brillante')}
  if((s.sharp||0)>12){score+=14;good.push('se ve clara')}else{score-=10;bad.push('puede estar borrosa')}
  if((s.contrast||0)>34){score+=8;good.push('buen contraste')}else{bad.push('falta contraste')}
  if(s.aspect>.65&&s.aspect<1.35){score+=8;good.push('encuadre útil para perfil')}else if(s.aspect>=1.35){bad.push('foto muy horizontal; quizá se pierda tu cara')}else{good.push('formato vertical útil')}
  if((photo.w||0)>=900&&(photo.h||0)>=900){score+=7;good.push('buena resolución')}else{bad.push('baja resolución')}
  score=Math.max(20,Math.min(95,score));
  let level=score>=78?'Buena para perfil':score>=58?'Sirve, pero mejora':'Mejor repetirla';
  return {score,level,good,bad};
}

function revisarMensaje(){
  let draft=(document.getElementById('ligarDraft')||{}).value?.trim()||'';
  let out=document.getElementById('ligarOut'); if(!out)return;
  if(!draft){alert('Escribe tu borrador primero');return}
  let lower=datingNormalize(draft),issues=[],good=[];
  if(draft.length>220)issues.push('Muy largo. Déjalo en una idea y una pregunta.');
  if((draft.match(/\?/g)||[]).length>1)issues.push('Demasiadas preguntas. Usa máximo una.');
  if(/[A-ZÁÉÍÓÚÑ]{6,}/.test(draft))issues.push('Evita mayúsculas; pueden sonar intensas.');
  if(/contesta|respondeme|resp[oó]ndeme|por que no|por qué no|insist|convencer|aunque digas no|dame una oportunidad|tu novio no/i.test(draft))issues.push('Suena insistente o presionante.');
  if(/idiota|loca|toxica|tóxica|estupida|estúpida|fea/i.test(draft))issues.push('Contiene descalificación. No lo envíes.');
  if(!issues.length)good.push('Se ve claro, breve y respetuoso.');
  let improved=draft
    .replace(/por qu[eé] no me contestas[?]?/ig,'Cuando tengas tiempo me cuentas.')
    .replace(/resp[oó]ndeme/ig,'cuando puedas dime')
    .replace(/dame una oportunidad/ig,'sin presión');
  let score=Math.max(0,100-issues.length*22-(draft.length>220?10:0));
  out.innerHTML=`<div class="ligar-result"><h3>✅ Revisión antes de enviar</h3>
    <div class="ligar-mini"><b>Calificación</b><span>${score}/100</span><div class="ligar-meter"><span style="width:${score}%"></span></div></div>
    ${issues.length?`<div class="ligar-warn"><b>Ajusta esto:</b><ul>${issues.map(x=>`<li>${safeText(x)}</li>`).join('')}</ul></div>`:`<div class="ligar-safe">${safeText(good.join(' '))}</div>`}
    <p><b>Versión revisada:</b></p><div class="item">${safeText(improved)}</div>
    ${datingCopyButton(improved,'Copiar versión')}
  </div>`;
}
function analyzeFullConversation(){
  let txt=(document.getElementById('conversationFull')||{}).value?.trim()||'';
  if(txt.length<12){alert('Pega una conversación más completa');return}
  let goal=(document.getElementById('datingGoal')||{}).value||'conocer';
  let lang=(document.getElementById('datingLanguage')||{}).value||'es';
  let culture=(document.getElementById('datingAnalysisCulture')||{}).value||datingCurrentCulture();
  state.dating.culture=culture;
  let person=(document.getElementById('datingPersonName')||{}).value?.trim()||'Sin nombre';
  let result=datingSentiment(txt);
  datingRenderResult(result,{goal,lang},'conversationAnalysis');
  let best=datingBestReplies(result,goal,lang)[0];
  let reason=result.boundary?'Expresó un límite claro.':result.score>=72?'Hay señales de reciprocidad o apertura.':result.score>=45?'Hay señales mixtas; falta claridad.':'Hay poca inversión o respuestas cerradas.';
  let analysis={id:Date.now(),date:new Date().toLocaleDateString('es-US'),person,level:result.level,score:result.score,reason,next:best,goal,culture,excerpt:txt.slice(0,180)};
  state.dating.history.unshift(analysis);state.dating.history=state.dating.history.slice(0,30);
  if(person&&person!=='Sin nombre'){
    let existing=state.dating.people.find(p=>datingNormalize(p.name)===datingNormalize(person));
    if(existing){existing.last=new Date().toLocaleDateString('es-US');existing.status=result.level;existing.note=reason;}
    else state.dating.people.unshift({id:Date.now(),name:person,where:(document.getElementById('datingChannel')||{}).value||'',status:result.level,note:reason,last:new Date().toLocaleDateString('es-US')});
    state.dating.people=state.dating.people.slice(0,30);
  }
  save();renderDatingHistory();
}

// Traduce los errores de Supabase Auth a mensajes claros en español.
function traducirAuthError(data,status){
  let code=(data&&(data.error_code||data.code)||'').toLowerCase();
  let msg=(data&&(data.msg||data.error_description||data.message||data.error)||'').toLowerCase();
  if(/rate limit|over_email_send|too many|429/.test(code+' '+msg)||status===429)
    return '⏳ Se enviaron demasiados correos en poco tiempo. Espera unos minutos antes de intentar de nuevo.';
  if(/already|exists|registered/.test(code+' '+msg))
    return 'Esa cuenta ya existe. Usa "Entrar" o, si no confirmaste tu correo, "Reenviar confirmación".';
  if(/invalid.login|invalid_credentials|invalid_grant|incorrect/.test(code+' '+msg))
    return 'Correo o contraseña incorrectos.';
  if(/email.not.confirmed|not_confirmed/.test(code+' '+msg))
    return 'Debes confirmar tu correo antes de entrar. Revisa tu bandeja y spam.';
  if(/weak.password|password.*short|password_too/.test(code+' '+msg))
    return 'La contraseña es muy corta (usa al menos 6 caracteres).';
  if(/invalid.*email|email_address_invalid|validation/.test(code+' '+msg))
    return 'El correo no es válido.';
  if(/signup.*disabled|signups_not_allowed/.test(code+' '+msg))
    return 'El registro está deshabilitado en el servidor.';
  return data&&(data.msg||data.error_description||data.message)||'Error de Supabase.';
}
async function supabaseAuth(path,body){
  let c=getCloudConfig();if(!c.url||!c.key)throw Error('Guarda URL y clave pública primero.');
  let r=await fetch(c.url+'/auth/v1/'+path,{method:'POST',headers:{apikey:c.key,'Content-Type':'application/json'},body:JSON.stringify(body)});
  let data=await r.json().catch(()=>({}));
  if(!r.ok){let err=Error(traducirAuthError(data,r.status));err.code=(data.error_code||data.code||'');err.status=r.status;throw err;}
  return data;
}
// ---- Control de reenvío de correos: evita solicitudes duplicadas y respeta un cooldown ----
let _authBusy=false,_confirmCooldownT=null;
const CONFIRM_COOLDOWN_MS=60000; // 60 s entre envíos de correo de confirmación
function _confirmCooldownLeft(){let last=+(safeStorage.get('pp_last_confirm_email')||0)||0;return Math.max(0,CONFIRM_COOLDOWN_MS-(Date.now()-last));}
function _startConfirmCooldown(){safeStorage.set('pp_last_confirm_email',String(Date.now()));_tickConfirmCooldown();}
function _setAuthBtns(disabled){['btnCrearCuenta','btnEntrar','btnReenviar'].forEach(id=>{let b=document.getElementById(id);if(b)b.disabled=disabled;});}
function _tickConfirmCooldown(){
  let left=_confirmCooldownLeft();
  ['btnCrearCuenta','btnReenviar'].forEach(id=>{let b=document.getElementById(id);if(!b)return;
    if(!b._orig)b._orig=b.textContent.replace(/\s*\(\d+\)\s*$/,'');
    if(left>0){b.disabled=true;b.textContent=b._orig+' ('+Math.ceil(left/1000)+')';}
    else{if(!_authBusy)b.disabled=false;b.textContent=b._orig;}
  });
  clearTimeout(_confirmCooldownT);
  if(left>0)_confirmCooldownT=setTimeout(_tickConfirmCooldown,500);
}

  }

// Une dos listas evitando duplicados (por id si existe, o por contenido).
function _mergeArrays(a,b){
  a=Array.isArray(a)?a:[];b=Array.isArray(b)?b:[];
  let seen=new Set(),out=[];
  let keyOf=x=>(x&&typeof x==='object'&&x.id!=null)?('id:'+x.id):('j:'+JSON.stringify(x));
  for(let item of a.concat(b)){let k=keyOf(item);if(!seen.has(k)){seen.add(k);out.push(item);}}
  return out;
}
// Fusión NO destructiva de estado local y de la nube: nunca se pierden datos.
// Las listas se unen; para valores sueltos/objetos gana la copia más reciente.
function mergeCloudStates(local,remote){
  local=local||{};remote=remote||{};
  let lt=Date.parse(local.lastModified||0)||0, rt=Date.parse(remote.lastModified||remote.updated_at||0)||0;
  let base = lt>=rt ? {...remote,...local} : {...local,...remote};
  let keys=new Set([...Object.keys(local),...Object.keys(remote)]);
  for(let k of keys){
    if(Array.isArray(local[k])||Array.isArray(remote[k])) base[k]=_mergeArrays(local[k],remote[k]);
  }
  base.lastModified=new Date().toISOString();
  return base;
}

function ppUUID(){try{if(window.crypto&&crypto.randomUUID)return crypto.randomUUID()}catch(e){}

// Asegura id/client_id/updated_at estables en un registro de peso. NUNCA borra ni reemplaza datos.
function normalizeWeightEntry(x){
  if(!x||typeof x!=='object')return x;
  if(!x.client_id)x.client_id=(x.id!=null?String(x.id):ppUUID());
  if(x.id==null)x.id=x.client_id;

// Fusiona listas de peso por client_id conservando la versión con updated_at más reciente. No pierde filas.
function mergeWeightLists(a,b){
  a=Array.isArray(a)?a:[];b=Array.isArray(b)?b:[];

  let put=x=>{if(!x||typeof x!=='object')return;normalizeWeightEntry(x);let prev=map.get(x.client_id);

let _autoSyncTimer=null,_syncing=false;
function scheduleAutoSync(){
  state.offlineChanges=(state.offlineChanges||0)+1;

async function cloudSave(silent=false){

    console.log('[SYNC] Respuesta de Supabase: respaldo guardado OK.');

// Espeja el estado local a las tablas granulares de forma NO destructiva (upsert por fila; nunca DELETE masivo).
// Best-effort: cualquier fallo aquí no afecta al respaldo principal (personal_backups).
async function mirrorGranular(uid){
  let now=new Date().toISOString();
  let listas={
    peso:(state.weight||[]),
    comidas:(state.meals||[]),
    ejercicios:(state.workoutLog||[]),
    pasos:(state.walks||[]),
    gastos:(state.expenses||[])
  };
  for(let tabla in listas){
    try{
      let filas=listas[tabla].map(item=>{ensureId(item);let cid=item.client_id||String(item.id);item.client_id=cid;
        return {user_id:uid,client_id:cid,data:item,updated_at:item.updated_at||now,deleted:false};});
      // Upsert por (user_id, client_id): agrega/actualiza sin borrar filas existentes de otros dispositivos.
      if(filas.length)await cloudRest(tabla+'?on_conflict=user_id,client_id',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(filas)});
      if(tabla==='peso')console.log('[SYNC] Peso espejado a la nube (upsert):',filas.length,'filas.');
    }catch(e){console.warn('[SYNC] Espejo '+tabla+' pendiente',e);}
  }
  // Calorías y proteína: total del día actual derivado de las comidas (se acumula un registro por día).
  try{
    let hoy=todayISO(),m=(state.meals||[]);
    let kcal=m.reduce((a,x)=>a+(+x.k||0),0),prot=m.reduce((a,x)=>a+(+x.p||0),0);
    await cloudRest('calorias?on_conflict=user_id,client_id',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({user_id:uid,client_id:hoy,data:{dia:hoy,kcal:Math.round(kcal)},updated_at:now})});
    await cloudRest('proteina?on_conflict=user_id,client_id',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({user_id:uid,client_id:hoy,data:{dia:hoy,g:Math.round(prot)},updated_at:now})});
  }catch(e){console.warn('Espejo calorías/proteína pendiente',e);}
  // Ajustes: una sola fila por usuario con la configuración.
  try{
    let ajustes={uiSettings:state.uiSettings,fitSettings:state.fitSettings,profile:state.profile,expenseSettings:state.expenseSettings,expenseTemplates:state.expenseTemplates};
    await cloudRest('ajustes?on_conflict=user_id',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({user_id:uid,data:ajustes,updated_at:now})});
  }catch(e){console.warn('Espejo ajustes pendiente',e);}
}

let _progressPhotoData='';
function previewProgressPhoto(input){
  let file=input.files&&input.files[0];if(!file)return;
  let reader=new FileReader();
  reader.onload=e=>{
    let image=new Image();
    image.onload=()=>{
      let max=900,scale=Math.min(1,max/Math.max(image.width,image.height)),canvas=document.createElement('canvas');
      canvas.width=Math.round(image.width*scale);canvas.height=Math.round(image.height*scale);
      canvas.getContext('2d').drawImage(image,0,0,canvas.width,canvas.height);
      _progressPhotoData=canvas.toDataURL('image/jpeg',.76);
      let box=document.getElementById('progressPhotoPreview');if(box){box.style.display='block';box.innerHTML=`<img src="${_progressPhotoData}" alt="Vista previa" style="max-width:260px;max-height:320px;border-radius:10px;object-fit:cover"><div class="ok">Lista para guardar · ${canvas.width}×${canvas.height}px</div>`}
    };

  };
  reader.readAsDataURL(file);
}

function tmSettingForStep(step,recipe){

  if(/amasa|masa/.test(text))return '2 min · función Amasar';
  if(/monta|batir crema|bate claras/.test(text))return 'Mariposa · 2-3 min · vel 3.5';
  if(/licua|tritura|puré|pure|procesa/.test(text))return recipe.type==='salsa'?'20-30 seg · vel 7':'30 seg · vel 5-8 progresiva';
  if(/pica|trocea/.test(text))return '5 seg · vel 5';
  if(/mezcla|integra|combina|revuelve/.test(text))return '10-15 seg · giro inverso · vel 3';

function getThermomixPlan(recipe){

  if(dressingName)linked.push(baseRecipes.find(item=>item.name===dressingName));

    plan.push({title:'Preparación previa',setting:'VASO LIMPIO',text:'Primero prepara '+part.name+' para que todo el platillo quede integrado.'});
    plan.push(...thermomixConvertedSteps(part,part.type==='salsa'?'Salsa':'Aderezo'));
    plan.push({title:'Reservar',setting:'MANUAL',text:'Pasa la preparación a un recipiente, tapa y reserva. Enjuaga el vaso si el siguiente paso cambia de sabor.'});
  });
  let linkedNames=linked.filter(Boolean).map(x=>x.name.toLowerCase());
  let mainSteps=thermomixConvertedSteps(recipe,'Platillo').filter(item=>{

function askRecipeAI(){
  let out=document.getElementById('recipeAIOut');if(!out)return;
  let question=(document.getElementById('recipeAIQuestion')?.value||'').trim().toLowerCase();
  let budget=+(document.getElementById('recipeAIBudget')?.value||999);
  let maxTime=+(document.getElementById('recipeAITime')?.value||999);
  let type=document.getElementById('recipeAIType')?.value||'todas';
  let words=question.normalize('NFD').replace(/[\u0300-\u036f]/g,'').split(/[^a-z0-9]+/).filter(x=>x.length>2);
  let aliases={
    pollo:['pollo'],cerdo:['cerdo','puerco'],vaca:['res','carne','bistec'],res:['res','carne','bistec'],
    salsa:['salsa','chile'],fruta:['fruta','platano','manzana','mango','papaya','fresa','piña'],
    agua:['agua fresca','horchata'],hotcake:['hotcake'],avena:['avena'],pan:['pan','tostada','sandwich'],
    aderezo:['aderezo','ranch','mostaza'],snack:['snack','botana']
  };
  let arr=baseRecipes.filter(r=>{
    if(type!=='todas'&&r.type!==type)return false;
    if(r.cost>budget||r.time>maxTime)return false;
    if(!words.length)return true;
    let hay=(r.name+' '+r.tags+' '+r.ingredients+' '+r.steps.join(' ')).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
    return words.some(word=>hay.includes(word)||(aliases[word]||[]).some(alias=>hay.includes(alias)));
  });
  if(/caloria|subir|peso|engordar/.test(question))arr.sort((a,b)=>b.k-a.k);
  else if(/proteina|musculo/.test(question))arr.sort((a,b)=>b.p-a.p);
  else if(/barat|econom/.test(question))arr.sort((a,b)=>a.cost-b.cost);
  else arr.sort((a,b)=>(b.k/b.cost)-(a.k/a.cost));
  arr=arr.slice(0,6);
  if(!arr.length){out.innerHTML='<div class="warn" style="margin-top:10px">No encontré una coincidencia con esos límites. Aumenta el presupuesto o el tiempo.</div>';return}
  out.innerHTML='<div class="ok" style="margin-top:10px"><b>Mejores opciones encontradas:</b><div class="grid" style="margin-top:8px">'+arr.map(r=>{
    let salsa=getRecipeSaucePair(r);
    return `<div class="mini"><b>${r.name}</b><br><span class="muted">${r.k} kcal · ${r.p}g proteína · ${r.time} min · ${money(r.cost)}</span>${salsa?`<br><span style="color:#b34d00">🌶️ Combina con ${salsa}</span>`:''}<br><button class="btn primary" style="margin-top:6px" onclick="openRecipeFromAI('${r.name.replace(/'/g,"\\'")}')">Abrir receta</button></div>`;
  }).join('')+'</div></div>';

      ta.value=text;ta.readOnly=true;ta.style.position='fixed';ta.style.top='0';ta.style.left='0';ta.style.opacity='0';
      document.body.appendChild(ta);ta.focus();ta.select();
      try{ta.setSelectionRange(0,text.length)}catch(e){}
      let done=document.execCommand&&document.execCommand('copy');
      document.body.removeChild(ta);
      return !!done;
    }catch(e){return false}
  }
  function manual(){try{window.prompt('Mantén presionado el texto y toca "Copiar":',text)}catch(e){alert(text)}}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(ok,function(){if(legacy())ok();else manual()});
    return;
  }
  if(legacy())ok();else manual();
}

function getFoodMeasure(foodIndex){
  let name=(foods[foodIndex]||[''])[0].toLowerCase();

  if(/2 cucharadas/.test(name))return{base:2,unit:'cda'};
  if(/cucharada| cda/.test(name))return{base:1,unit:'cda'};
  if(/2 rebanadas/.test(name))return{base:2,unit:'rebanada'};
  if(/lata/.test(name))return{base:1,unit:'lata'};
